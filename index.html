&lt;style&gt;
  /* ============================================================
     TOKENS — Bumpy chrome stays monochrome; the EVENT owns the accent.
     data-event-theme switches the artwork-extracted palette.
     ============================================================ */
  :root {
    /* ---- Surfaces: the depth ladder. well &lt; bg &lt; glass (recessed → floating) */
    --bg: #0a0a0c;
    --well: #050507;
    --glass: rgba(255, 255, 255, 0.045);
    --glass-2: rgba(255, 255, 255, 0.08);
    /* ---- Ink */
    --ink: #f6f5f4;
    --ink-2: #a8a29e;
    --ink-3: #8a8481;
    /* ---- Hairlines */
    --line: rgba(255, 255, 255, 0.09);
    --line-soft: rgba(255, 255, 255, 0.05);
    /* ---- Semantic state. Independent of the artwork accent, on purpose:
           green always means &quot;you saved&quot;, red always means &quot;fix this&quot;. */
    --pos: #34d399;
    --pos-soft: rgba(52, 211, 153, 0.8);
    --warn: #ffc46b;
    --danger: #ff8a8a;
    /* ---- Shape + motion */
    --r-lg: 1.35rem;
    --r-xl: 1.65rem;
    --r-pill: 999px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1); /* ease-out-quint */
    --dur: 220ms;
    /* ---- Label tiers. Two, not six. */
    --label: 0.72rem;     /* section labels: ABOUT, TICKETS, ORDER SUMMARY */
    --label-sm: 0.64rem;  /* micro: WHEN/WHERE, field labels, chips, pills */
    /* ---- The one CTA */
    --cta-size: 0.92rem;

    /* Accent stays fixed orange; poster artwork is a separate (non-orange) palette */
    --accent: #e7ff1a;
    --glow: #f2ff7d;
    --accent-ink: #1a2300;
    /* Poster artwork — cool blue hero */
    --sky-a: #0e1f3a;
    --sky-b: #2a63b8;
    --sky-c: #7fd6ec;
    --sea: #0a1526;
  }
  [data-event-theme=&quot;acid&quot;] {
    --accent: #c6f543;
    --glow: #59f0c6;
    --accent-ink: #101a02;
    --sky-a: #05140d;
    --sky-b: #103d2a;
    --sky-c: #c6f543;
    --sea: #061a12;
  }
  [data-event-theme=&quot;midnight&quot;] {
    --accent: #8b7cff;
    --glow: #4da6ff;
    --accent-ink: #0d0824;
    --sky-a: #0a0724;
    --sky-b: #2b1f6e;
    --sky-c: #4da6ff;
    --sea: #0a0a2e;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ============================================================
     AMBIENT BACKDROP — one masked fixed layer (replaces the
     h-[800px] stack; nothing can leak below the footer).
     ============================================================ */
  .ambient {
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(58vw 58vw at 28% 8%, color-mix(in oklab, var(--accent) 26%, transparent), transparent 68%),
      radial-gradient(42vw 42vw at 78% 2%, color-mix(in oklab, var(--glow) 14%, transparent), transparent 70%),
      var(--bg);
    mask-image: linear-gradient(to bottom, #000 0%, #000 38%, transparent 82%);
    transition: background 600ms var(--ease);
  }

  /* ============================================================ HEADER */
  .hdr {
    position: sticky;
    top: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem clamp(1rem, 4vw, 3rem);
    transition: background var(--dur) ease, border-color var(--dur) ease, backdrop-filter var(--dur) ease;
    border-bottom: 1px solid transparent;
  }
  .hdr.scrolled {
    background: rgba(10, 10, 12, 0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom-color: var(--line);
  }

  /* ============================================================ STICKY BAR */

  .bar {

    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 280ms var(--ease);
  }
  .cat-body.open { grid-template-rows: 1fr; }
  .cat-body &gt; div { min-height: 0; overflow: hidden; }
  /* The well: recessed surface, darker than the page. Contents read as
     &quot;inside the category&quot; without a card. */
  .cat-well {
    background: var(--well);
    border-bottom: 1px solid var(--line);
    box-shadow: inset 0 8px 14px -10px rgba(0, 0, 0, 0.9);
  }
  .cat-body .row {
    margin: 0 0.9rem;
    padding-left: 0.25rem;
    border-bottom-color: var(--line-soft);
  }
  .cat-body .row:last-child { border-bottom: none; }
  .cat-body .row.picked {
    background: linear-gradient(90deg,
      color-mix(in oklab, var(--accent) 11%, transparent),
      transparent 70%);
  }
  @media (prefers-reduced-motion: reduce) {
    .cat-body { transition: none; }
  }

  /* ============================================================ STICKY FOOTER (floats → glass) */
  .foot {
    position: fixed;
    left: 50%;
    bottom: 1rem;
    transform: translateX(-50%);
    z-index: 50;
    width: min(608px, calc(100vw - 1.6rem));
    padding: 0.75rem 0.75rem 0.75rem 1.3rem;
    border-radius: var(--r-lg);
    background: rgba(16, 16, 18, 0.86);
    border: 1px solid var(--line);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 18px 60px -12px color-mix(in oklab, var(--accent) 34%, rgba(0, 0, 0, 0.6));
    transition: transform 320ms var(--ease), opacity 260ms ease, box-shadow 600ms var(--ease);
  }
  .foot.hide {
    transform: translateX(-50%) translateY(150%);
    opacity: 0;
    pointer-events: none;
  }
  .foot-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .foot-sum small {
    display: block;
    color: var(--ink-2);
    font-size: 0.72rem;
    font-weight: 600;
  }
  .foot-sum b {
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  .cta {
    border: none;
    cursor: pointer;
    font-weight: 800;
    font-size: var(--cta-size);
    padding: 0.8rem 1.7rem;
    border-radius: var(--r-pill);
    color: var(--accent-ink);
    background: linear-gradient(135deg, var(--glow), var(--accent));
    box-shadow: 0 6px 24px -6px color-mix(in oklab, var(--accent) 70%, transparent);
    transition: transform 140ms var(--ease);
    white-space: nowrap;
    min-width: 8.1rem;
  }
  .cta:hover:not(:disabled) { transform: translateY(-1px) scale(1.02); }
  .cta:active:not(:disabled) { transform: scale(0.98); }
  .cta:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .cta:disabled {
    background: var(--glass-2);
    color: var(--ink-3);
    box-shadow: none;
    cursor: not-allowed;
  }

  /* Fee breakdown (production: only when separateCommission) */
  .fees {
    display: none;
    margin-top: 0.7rem;
    padding-top: 0.7rem;
    border-top: 1px solid var(--line);
    font-size: 0.83rem;

  .fees.on { display: block; }
  .fee-row {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    color: var(--ink-2);

  }
  .fee-row b { color: var(--ink-2); font-weight: 600; font-variant-numeric: tabular-nums; }
  .fee-row.tot { color: var(--ink); margin: 0.5rem 0 0; }
  .fee-row.tot b { color: var(--ink); font-weight: 800; font-size: 1rem; }

  /* ============================================================ DEMO CONTROLS */
  .demo-bar {
    position: fixed;
    bottom: 1rem;
    left: 1rem;
    z-index: 60;
    display: flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.4rem 0.6rem;
    border-radius: var(--r-pill);
    background: rgba(18, 18, 21, 0.9);
    border: 1px solid var(--line);
    backdrop-filter: blur(12px);
    font-size: 0.72rem;
    color: var(--ink-3);
    opacity: 0.45;
    transition: opacity var(--dur) ease;
  }
  .demo-bar:hover, .demo-bar:focus-within { opacity: 1; }
  .demo-bar b { color: var(--ink-2); font-weight: 600; }
  .swatch {
    width: 1.5rem; height: 1.5rem; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; padding: 0;
    transition: transform var(--dur) var(--ease), border-color var(--dur) ease;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .swatch.on { border-color: #fff; }
  .swatch.sunset { background: linear-gradient(135deg, #ff6b4a, #ffc46b); }
  .swatch.acid { background: linear-gradient(135deg, #103d2a, #c6f543); }
  .swatch.midnight { background: linear-gradient(135deg, #2b1f6e, #4da6ff); }
  .fdiv { width: 1px; height: 1.2rem; background: var(--line); margin: 0 0.15rem; }
  .tgl {
    height: 1.5rem; padding: 0 0.6rem; border-radius: var(--r-pill);
    border: 1px solid var(--line); background: transparent; color: var(--ink-3);
    font-size: 0.7rem; font-weight: 600; cursor: pointer;
    transition: color var(--dur) ease, border-color var(--dur) ease;
  }
  .tgl:hover { color: var(--ink-2); }
  .tgl.on { color: var(--ink); border-color: #fff; }
  .tgl:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  @media (max-width: 880px) {
    .demo-bar { bottom: auto; top: 4.1rem; left: 50%; transform: translateX(-50%); padding: 0.35rem; }
    .demo-bar b { display: none; }
    /* keep the demo control clear of the event strip */
    .wrap { padding-top: 4.6rem; }
  }

  .toast {
    position: fixed;
    bottom: 7.2rem;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    z-index: 70;
    background: var(--ink);
    color: #111;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.55rem 1.05rem;
    border-radius: var(--r-pill);
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--dur) ease, transform var(--dur) var(--ease);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: no-preference) {
    .ev { animation: rise 380ms var(--ease) both; }
    .list { animation: rise 380ms var(--ease) 70ms both; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  }

  &lt;button class=&quot;tgl&quot; id=&quot;fee-tgl&quot; aria-pressed=&quot;false&quot;&gt;Separate fees&lt;/button&gt;
&lt;/div&gt;

&lt;script&gt;
  /* ---- Cross-page navigation ------------------------------------------
     The four mockups are separate files. Navigate between them relatively
     when opened locally (all in one folder), or by artifact URL when viewed
     on claude.ai — so the flow connects in both places. */
  const NAV = (() =&gt; {
    const A = {
      event:    &quot;https://claude.ai/code/artifact/77f4ef1f-f3a4-4ee2-b89b-02127d17edc5&quot;,
      select:   &quot;https://claude.ai/code/artifact/47fb6c2a-121e-4972-95a6-8c5a9e8bae19&quot;,
      checkout: &quot;https://claude.ai/code/artifact/c7332fcc-5b94-40ac-9f12-b3026e750ccb&quot;,
      confirm:  &quot;https://claude.ai/code/artifact/44ecbc66-1bd3-4ce2-a6bc-829459ae7cd8&quot;,
    };
    const R = {
      event:    &quot;bumpy-event-page-mockup.html&quot;,
      select:   &quot;bumpy-ticket-selection-mockup.html&quot;,
      checkout: &quot;bumpy-checkout-mockup.html&quot;,
      confirm:  &quot;bumpy-confirmation-mockup.html&quot;,
    };
    const onArtifact = /(^|\.)claude\.ai$/.test(location.hostname);
    return (key, order) =&gt; {
      // inside the combined flow shell: switch views without navigating,
      // handing the chosen tickets to the next page
      try { if (window.parent &amp;&amp; window.parent !== window) { window.parent.postMessage({ bumpyNav: key, order: order || null }, &quot;*&quot;); return; } } catch (e) {}
      window.location.href = (onArtifact ? A : R)[key];
    };
  })();

  // Header: back → event page, close → event page
  document.querySelector('[aria-label=&quot;Go back&quot;]').addEventListener(&quot;click&quot;, () =&gt; NAV(&quot;event&quot;));
  document.querySelector('[aria-label=&quot;Close&quot;]').addEventListener(&quot;click&quot;, () =&gt; NAV(&quot;event&quot;));

  // Category accordion
  const catBtn = document.getElementById(&quot;cat-btn&quot;);
  const catBody = document.getElementById(&quot;cat-body&quot;);
  catBtn.addEventListener(&quot;click&quot;, () =&gt; {
    const open = catBtn.getAttribute(&quot;aria-expanded&quot;) === &quot;true&quot;;
    catBtn.setAttribute(&quot;aria-expanded&quot;, String(!open));
    catBody.classList.toggle(&quot;open&quot;, !open);
  });

  /* ------------------------------------------------------------------
     Sale-end countdown.
     Production rule (shouldShowSaleEndCountdown): only render when the
     ticket is active AND sale_end_at &lt; event end. Precision adapts —
     seconds only appear in the final hour, where they actually matter.
     ------------------------------------------------------------------ */
  const cdEls = [...document.querySelectorAll(&quot;.r-cd[data-sale-end]&quot;)].map((el) =&gt; {
    const spec = el.dataset.saleEnd;             // demo offsets: &quot;+50h&quot;, &quot;+3h12m&quot;
    const h = /(\d+)h/.exec(spec)?.[1] || 0;
    const m = /(\d+)m/.exec(spec)?.[1] || 0;
    return { el, target: Date.now() + (Number(h) * 3600 + Number(m) * 60) * 1000 };
  });

  function fmtLeft(ms) {
    const s = Math.floor(ms / 1000);
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const unit = (n, u) =&gt; `${n} ${u}${n !== 1 ? &quot;s&quot; : &quot;&quot;}`;
    if (d &gt; 0) return `${unit(d, &quot;day&quot;)} ${unit(h, &quot;hour&quot;)}`;
    if (h &gt; 0) return `${unit(h, &quot;hour&quot;)} ${m} min`;
    return `${m} min ${sec} sec`;
  }

  function tickCountdowns() {
    cdEls.forEach(({ el, target }) =&gt; {
      const left = target - Date.now();
      el.textContent = left &gt; 0 ? `Sale ends in ${fmtLeft(left)}` : &quot;&quot;;
    });
  }
  tickCountdowns();
  setInterval(tickCountdowns, 1000);

  // Selection state
  const foot = document.getElementById(&quot;foot&quot;);
  const sum = document.getElementById(&quot;sum&quot;);
  const feesEl = document.getElementById(&quot;fees&quot;);
  const state = {};
  /* Fee is a fixed per-ticket amount (fee_per_ticket × qty) carved OUT of the
     ticket price — production's showFeeBreakdown splits the total, never grows
     it: ticketBaseTotal + feeTotal === totalPrice. */
  const FEE_PER_TICKET = 38;

  const fmt = (n) =&gt; n.toLocaleString(&quot;en-US&quot;) + &quot; THB&quot;;

  function render() {
    let count = 0;
    let base = 0;
    document.querySelectorAll(&quot;.row[data-t]&quot;).forEach((row) =&gt; {
      const t = row.dataset.t;
      const n = state[t] || 0;
      const q = row.querySelector(&quot;.qty&quot;);
      if (q) {
        q.querySelector(&quot;span&quot;).textContent = n;
        q.querySelector(&quot;.minus&quot;).disabled = n === 0;
      }
      row.classList.toggle(&quot;picked&quot;, n &gt; 0);
      count += n;
      base += n * Number(row.dataset.price);
    });

    /* Donation validation. Production blocks checkout via hasDonationAmountError
       but only paints the border red — the message below is the addition. */
    const donInput = document.querySelector(&quot;.don input&quot;);
    const donRow = donInput.closest(&quot;.row&quot;);
    const donErr = document.getElementById(&quot;don-err&quot;);
    const MIN = 100, MAX = 5000;
    const raw = donInput.value.trim();
    const donation = raw === &quot;&quot; ? 0 : Number(raw);
    let donInvalid = false;
    let msg = &quot;&quot;;

    if (raw !== &quot;&quot;) {
      if (!Number.isFinite(donation) || donation &lt; MIN) {
        donInvalid = true;
        msg = `Enter at least ${MIN.toLocaleString()} THB`;
      } else if (donation &gt; MAX) {
        donInvalid = true;
        msg = `Enter ${MAX.toLocaleString()} THB or less`;
      }
    }

    donRow.classList.toggle(&quot;invalid&quot;, donInvalid);
    donInput.setAttribute(&quot;aria-invalid&quot;, String(donInvalid));
    donErr.innerHTML = donInvalid
      ? `&lt;svg width=&quot;14&quot; height=&quot;14&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;9&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.8&quot;/&gt;&lt;path d=&quot;M12 7.5v5&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot;/&gt;&lt;circle cx=&quot;12&quot; cy=&quot;16.3&quot; r=&quot;1&quot; fill=&quot;currentColor&quot;/&gt;&lt;/svg&gt;${msg}`
      : &quot;&quot;;

    // Only a valid donation counts toward the total
    if (!donInvalid &amp;&amp; donation &gt; 0) { count += 1; base += donation; }
    donRow.classList.toggle(&quot;picked&quot;, !donInvalid &amp;&amp; donation &gt; 0);

    const feesOn = feesEl.classList.contains(&quot;on&quot;);
    const total = base;                          // what the tickets cost — fixed
    const fee = feesOn ? FEE_PER_TICKET * count : 0;
    const ticketBase = total - fee;              // carve-out, so base + fee === total

    sum.innerHTML = `&lt;small&gt;${count} ${count === 1 ? &quot;ticket&quot; : &quot;tickets&quot;}&lt;/small&gt;` +
      (feesOn ? &quot;&quot; : `&lt;b&gt;${fmt(total)}&lt;/b&gt;`);
    document.getElementById(&quot;f-base&quot;).textContent = fmt(ticketBase);
    document.getElementById(&quot;f-fee&quot;).textContent = fmt(fee);
    document.getElementById(&quot;f-tot&quot;).textContent = fmt(total);

    // Production parity: an invalid donation blocks checkout
    document.getElementById(&quot;cta&quot;).disabled = donInvalid;
    foot.classList.toggle(&quot;hide&quot;, count === 0 &amp;&amp; !donInvalid);
  }

  document.querySelectorAll(&quot;.row[data-t]&quot;).forEach((row) =&gt; {
    const t = row.dataset.t;
    const plus = row.querySelector(&quot;.plus&quot;);
    const minus = row.querySelector(&quot;.minus&quot;);
    if (plus) plus.addEventListener(&quot;click&quot;, () =&gt; { state[t] = (state[t] || 0) + 1; render(); });
    if (minus) minus.addEventListener(&quot;click&quot;, () =&gt; { state[t] = Math.max(0, (state[t] || 0) - 1); render(); });
  });
  document.querySelector(&quot;.don input&quot;).addEventListener(&quot;input&quot;, render);

  // Fee-breakdown variant (production: event.separateCommission)
  const feeTgl = document.getElementById(&quot;fee-tgl&quot;);
  feeTgl.addEventListener(&quot;click&quot;, () =&gt; {
    const on = feesEl.classList.toggle(&quot;on&quot;);
    feeTgl.classList.toggle(&quot;on&quot;, on);
    feeTgl.setAttribute(&quot;aria-pressed&quot;, String(on));
    render();
  });

  /* Gather the chosen tickets so Pay + Confirmation show exactly this order.
     One line item per ticket type with a positive quantity, plus a valid
     donation as its own line. */
  function buildOrder() {
    const items = [];
    document.querySelectorAll(&quot;.row[data-t]&quot;).forEach((row) =&gt; {
      const t = row.dataset.t;
      if (t === &quot;donation&quot;) return;
      const qty = state[t] || 0;
      if (qty &gt; 0) {
        items.push({
          name: row.querySelector(&quot;.r-name&quot;).textContent.trim(),
          category: row.dataset.cat || null,
          qty,
          unit: Number(row.dataset.price),
        });
      }
    });
    const donInput = document.querySelector(&quot;.don input&quot;);
    const donation = Number((donInput.value || &quot;&quot;).trim());
    if (Number.isFinite(donation) &amp;&amp; donation &gt;= 100 &amp;&amp; donation &lt;= 5000) {
      items.push({ name: &quot;Support the beach clean-up&quot;, category: null, qty: 1, unit: donation });
    }
    return { items };
  }

  document.getElementById(&quot;cta&quot;).addEventListener(&quot;click&quot;, () =&gt; NAV(&quot;checkout&quot;, buildOrder()));

  render();
&lt;/script&gt;
"></iframe>
  <iframe class="pg" id="pg-checkout" data-key="checkout" title="Bumpy checkout" srcdoc="&lt;meta charset=&quot;utf-8&quot;&gt;
&lt;title&gt;Bumpy — Checkout Redesign Mockup&lt;/title&gt;
&lt;meta name=&quot;color-scheme&quot; content=&quot;dark&quot;&gt;
&lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1&quot;&gt;
&lt;style&gt;
  :root {
    /* ---- Surfaces: the depth ladder. well &lt; bg &lt; glass (recessed → floating) */
    --bg: #0a0a0c;
    --well: #050507;
    --glass: rgba(255, 255, 255, 0.045);
    --glass-2: rgba(255, 255, 255, 0.08);
    /* ---- Ink */
    --ink: #f6f5f4;
    --ink-2: #a8a29e;
    --ink-3: #8a8481;
    /* ---- Hairlines */
    --line: rgba(255, 255, 255, 0.09);
    --line-soft: rgba(255, 255, 255, 0.05);
    /* ---- Semantic state. Independent of the artwork accent, on purpose:
           green always means &quot;you saved&quot;, red always means &quot;fix this&quot;. */
    --pos: #34d399;
    --pos-soft: rgba(52, 211, 153, 0.8);
    --warn: #ffc46b;
    --danger: #ff8a8a;
    /* ---- Shape + motion */
    --r-lg: 1.35rem;
    --r-xl: 1.65rem;
    --r-pill: 999px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1); /* ease-out-quint */
    --dur: 220ms;
    /* ---- Label tiers. Two, not six. */
    --label: 0.72rem;     /* section labels: ABOUT, TICKETS, ORDER SUMMARY */
    --label-sm: 0.64rem;  /* micro: WHEN/WHERE, field labels, chips, pills */
    /* ---- The one CTA */
    --cta-size: 0.92rem;

    /* ---- Artwork-extracted accent (per event) */
    --accent: #e7ff1a;
    --glow: #f2ff7d;
    --accent-ink: #1a2300;
    --sky-a: #0e1f3a; --sky-b: #2a63b8; --sky-c: #7fd6ec; --sea: #0a1526; /* blue poster; accent stays orange */
  }
  [data-event-theme=&quot;acid&quot;] {
    --accent: #c6f543; --glow: #59f0c6; --accent-ink: #101a02;
    --sky-a: #05140d; --sky-b: #103d2a; --sky-c: #c6f543; --sea: #061a12;
  }
  [data-event-theme=&quot;midnight&quot;] {
    --accent: #8b7cff; --glow: #4da6ff; --accent-ink: #0d0824;
    --sky-a: #0a0724; --sky-b: #2b1f6e; --sky-c: #4da6ff; --sea: #0a0a2e;
  }

  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, sans-serif;
    line-height: 1.55; -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  .ambient {
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(60vw 40vw at 50% -8%, color-mix(in oklab, var(--accent) 13%, transparent), transparent 70%),
      var(--bg);
    mask-image: linear-gradient(to bottom, #000 0%, #000 28%, transparent 66%);
    transition: background 600ms var(--ease);
  }

  /* ============================================================ HEADER */
  .hdr {
    position: sticky; top: 0; z-index: 40;
    background: rgba(10, 10, 12, 0.86);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .hdr-in {
    /* header chrome matches the other funnel steps (640) so Back/X sit in the
       same spot on every step, even though the body below is wider (940) */
    max-width: 640px; margin: 0 auto;
    padding: 0.7rem clamp(0.8rem, 3vw, 1.5rem);
    display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
  }
  .icon-btn {
    width: 2.3rem; height: 2.3rem; border-radius: 50%; border: none;
    background: transparent; color: var(--ink-2); display: grid; place-items: center;
    cursor: pointer; flex-shrink: 0;
    transition: background var(--dur) ease, color var(--dur) ease;
  }
  .icon-btn:hover { background: var(--glass); color: var(--ink); }
  .icon-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  .steps { display: flex; align-items: center; gap: 0.5rem; min-width: 0; }
  .step { display: flex; align-items: center; gap: 0.42rem; min-width: 0; }
  .dot {
    width: 0.42rem; height: 0.42rem; border-radius: 50%;
    background: var(--ink-3); flex-shrink: 0;
    transition: background var(--dur) ease, box-shadow var(--dur) ease;
  }
  .step.now .dot {
    background: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent);
  }
  .step span {
    font-size: var(--label); font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink-3); white-space: nowrap;
  }
  .step.now span { color: var(--ink); }
  .step.done span { color: var(--ink-2); }
  .step-sep { width: 1.1rem; height: 1px; background: var(--line); flex-shrink: 0; }
  @media (max-width: 620px) {
    .step:not(.now) span { display: none; }
    .step-sep { width: 0.7rem; }
  }

  .timer { position: relative; height: 2px; background: var(--glass-2); max-width: 640px; margin: 0 auto; }
  .timer-fill {
    height: 100%; background: linear-gradient(90deg, var(--glow), var(--accent));
    transition: width 1s linear, background 400ms ease;
  }
  .timer.warn .timer-fill { background: var(--warn); }
  .timer-txt {
    position: absolute; right: clamp(0.8rem, 3vw, 1.5rem); top: 0.35rem;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em;
    color: var(--ink-3); font-variant-numeric: tabular-nums;
    transition: color 400ms ease;
  }
  .timer.warn .timer-txt { color: var(--warn); }

  /* ============================================================ LAYOUT */
  .wrap {
    max-width: 940px; margin: 0 auto;
    padding: 1.6rem clamp(0.9rem, 3vw, 1.5rem) 4rem;
    display: grid; grid-template-columns: 1fr 1.15fr;
    gap: clamp(1.5rem, 4vw, 3rem); align-items: start;
  }
  @media (max-width: 860px) { .wrap { grid-template-columns: 1fr; gap: 2rem; } }
  .col-sticky { position: sticky; top: 5rem; }
  @media (max-width: 860px) { .col-sticky { position: static; } }

  .lbl {
    font-size: var(--label); font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.09em; color: var(--ink-2); margin: 0 0 0.85rem;
  }
  .lbl.mt { margin-top: 2rem; }
  .lbl-sub { font-weight: 500; letter-spacing: 0.04em; color: var(--ink-3); margin-left: 0.4rem; }

  /* Event strip + summary */
  .ev { display: flex; align-items: center; gap: 0.9rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--line); }
  .ev-art {
    width: 3.4rem; height: 3.4rem; border-radius: 0.7rem; overflow: hidden; flex-shrink: 0;
    box-shadow: 0 8px 26px -6px color-mix(in oklab, var(--accent) 45%, transparent);
  }
  .ev-art svg { display: block; width: 100%; height: 100%; }
  .ev-t { font-weight: 700; font-size: 0.98rem; letter-spacing: -0.01em; margin: 0; }
  /* The event's age rule, visible wherever the age is being judged */
  .ev-age {
    display: inline-block; margin-left: 0.35rem; vertical-align: 1px;
    font-size: 0.6rem; font-weight: 800; letter-spacing: 0.04em;
    color: var(--ink-2); padding: 0.1rem 0.35rem;
    border: 1px solid var(--line); border-radius: var(--r-pill);
  }
  .ev-s { color: var(--ink-2); font-size: 0.8rem; margin: 0.1rem 0 0; }

  .ord-row {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 1rem; padding: 0.62rem 0; font-size: 0.9rem;
  }
  .ord-row .n { color: var(--ink-2); min-width: 0; }
  .ord-row .v { font-variant-numeric: tabular-nums; white-space: nowrap; font-weight: 600; }
  .ord-row.item .n { color: var(--ink); }
  .ord-row.item .n b { font-weight: 700; margin-right: 0.3rem; }
  .ord-row.disc .n, .ord-row.disc .v { color: var(--pos); }
  .ord-line-disc {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 1rem; padding: 0 0 0.5rem 1.5rem; font-size: 0.78rem; color: var(--pos);
  }
  .ord-line-disc span:first-child { color: var(--pos-soft); }
  .ord-line-disc span:last-child { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .ord-sep { height: 1px; background: var(--line); margin: 0.5rem 0; }
  .ord-row.total { padding-top: 0.2rem; }
  .ord-row.total .n { color: var(--ink); font-weight: 700; font-size: 1rem; }
  .ord-row.total .v { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.01em; }

  .coupon { display: flex; gap: 0.5rem; margin-top: 0.9rem; }
  .coupon input {
    flex: 1; min-width: 0; height: 2.4rem; padding: 0 0.9rem;
    border-radius: var(--r-pill); border: 1px solid var(--line);
    background: var(--glass); color: var(--ink); font: inherit; font-size: 0.86rem;
    outline: none; transition: border-color var(--dur) ease;
  }
  .coupon input::placeholder { color: var(--ink-3); }
  .coupon input:focus { border-color: color-mix(in oklab, var(--accent) 60%, transparent); }
  .coupon button {
    height: 2.4rem; padding: 0 1.1rem; border-radius: var(--r-pill);
    border: 1px solid var(--line); background: transparent; color: var(--ink);
    font: inherit; font-size: 0.82rem; font-weight: 700; cursor: pointer;
    transition: background var(--dur) ease;
  }
  .coupon button:hover:not(:disabled) { background: var(--glass-2); }
  .coupon button:disabled { opacity: 0.4; cursor: not-allowed; }
  .code-err { margin: 0.55rem 0 0; font-size: 0.78rem; font-weight: 600; color: var(--danger); }
  .code-chip {
    display: inline-flex; align-items: center; gap: 0.5rem;
    margin-top: 0.9rem; padding: 0.4rem 0.45rem 0.4rem 0.75rem;
    border-radius: var(--r-pill);
    background: color-mix(in oklab, var(--pos) 10%, transparent); border: 1px solid color-mix(in oklab, var(--pos) 22%, transparent);
    font-size: 0.8rem; font-weight: 700; color: var(--pos);
  }
  .code-chip button {
    width: 1.3rem; height: 1.3rem; border-radius: 50%; border: none;
    background: transparent; color: var(--pos); cursor: pointer;
    display: grid; place-items: center; transition: background var(--dur) ease;
  }
  .code-chip button:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .signed { display: flex; align-items: center; gap: 0.55rem; margin-top: 1.1rem; font-size: 0.8rem; color: var(--ink-3); }
  .signed b { color: var(--ink-2); font-weight: 600; }
  .signed a { color: var(--ink-2); text-decoration: underline; text-underline-offset: 2px; }

  /* ============================================================ VIEW SWITCH */
  .view-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 1rem; margin-bottom: 1.1rem;
  }
  .view-title { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; margin: 0; }
  .view-sub { color: var(--ink-2); font-size: 0.83rem; margin: 0.2rem 0 0; }
  .view-count {
    font-size: 0.7rem; font-weight: 700; color: var(--ink-2);
    padding: 0.25rem 0.6rem; border: 1px solid var(--line); border-radius: var(--r-pill);
    white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  .backlink {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: none; border: none; padding: 0.3rem 0; margin-bottom: 0.7rem;
    color: var(--ink-3); font: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer;
    transition: color var(--dur) ease;
  }
  .backlink:hover { color: var(--ink); }
  .backlink:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .sect { margin-top: 1.6rem; }
  .sect:first-of-type { margin-top: 0; }
  .sect-lbl {
    font-size: var(--label); font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--ink-2);
    padding-bottom: 0.7rem; margin: 0 0 0.2rem; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  }

  /* Fields */
  .field { margin-top: 0.85rem; }
  .field label {
    display: block; font-size: var(--label-sm); font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--ink-2); margin-bottom: 0.3rem;
  }
  .field input, .field select {
    width: 100%; height: 2.6rem; padding: 0 0.85rem;
    border-radius: 0.7rem; border: 1px solid var(--line);
    background: var(--glass); color: var(--ink); font: inherit; font-size: 0.9rem;
    outline: none; transition: border-color var(--dur) ease;
  }
  .field input::placeholder { color: var(--ink-3); }
  .field input:focus, .field select:focus { border-color: color-mix(in oklab, var(--accent) 60%, transparent); }
  .field select { cursor: pointer; padding: 0 0.6rem; }
  .field-row { display: flex; gap: 0.7rem; align-items: flex-start; }
  .field-row .field { flex: 1; min-width: 0; }
  /* Field-level error — under the field that caused it, never colour alone */
  .f-err {
    display: none; align-items: flex-start; gap: 0.3rem;
    margin: 0.4rem 0 0; font-size: 0.74rem; font-weight: 600;
    line-height: 1.35; color: var(--danger);
  }
  .f-err.on { display: flex; }
  .f-err svg { flex-shrink: 0; margin-top: 0.1rem; }
  .field input.bad { border-color: color-mix(in oklab, var(--danger) 80%, transparent); }
  .field input.bad:focus { border-color: var(--danger); }

  /* Profile summary block */
  .att { padding: 1rem 0; }
  .att-head { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; }
  .att-name { font-size: 0.88rem; font-weight: 700; }
  .att-tag {
    font-size: var(--label-sm); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--ink-3); padding: 0.15rem 0.5rem; border: 1px solid var(--line); border-radius: var(--r-pill);
  }
  .att-tag.you { color: var(--glow); border-color: color-mix(in oklab, var(--accent) 35%, transparent); }

  /* Attendee accordion — production behaviour (collapsed panels, first open,
     status icon per panel), restyled: flat headers + recessed wells. */
  .grp-hd {
    font-size: var(--label-sm); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--ink-3); margin: 1.2rem 0 0; padding-bottom: 0.5rem;
  }
  .att-acc { border-bottom: 1px solid var(--line-soft); }
  .att-acc:last-child { border-bottom: none; }
  .att-hd {
    display: flex; align-items: center; gap: 0.75rem; width: 100%;
    padding: 0.8rem 0.2rem; background: transparent; border: none;
    color: inherit; font: inherit; text-align: left; cursor: pointer;
    border-radius: 0.6rem;
    transition: background var(--dur) ease;
  }
  .att-hd:hover { background: var(--glass); }
  .att-hd:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .att-ico {
    width: 2.1rem; height: 2.1rem; border-radius: 50%; flex-shrink: 0;
    display: grid; place-items: center;
    background: var(--glass); color: var(--ink-3);
    transition: background var(--dur) ease, color var(--dur) ease;
  }
  .att-acc.valid .att-ico { background: color-mix(in oklab, var(--pos) 15%, transparent); color: var(--pos); }
  .att-nm { flex: 1; min-width: 0; font-size: 0.9rem; font-weight: 650; }
  .att-nm em {
    font-style: normal; font-weight: 500; color: var(--ink-3);
    margin-left: 0.35rem; font-size: 0.82rem;
  }
  .att-chev { color: var(--ink-3); flex-shrink: 0; transition: transform var(--dur) var(--ease); }
  .att-hd[aria-expanded=&quot;true&quot;] .att-chev { transform: rotate(180deg); }
  .att-body {
    display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows 280ms var(--ease);
  }
  .att-body.open { grid-template-rows: 1fr; }
  .att-body &gt; div { min-height: 0; overflow: hidden; }
  .att-well {
    background: var(--well); border-radius: 0.9rem;
    padding: 0.1rem 0.9rem 1rem; margin: 0 0 0.85rem;
    box-shadow: inset 0 8px 14px -10px rgba(0, 0, 0, 0.9);
  }
  @media (prefers-reduced-motion: reduce) { .att-body { transition: none; } }

  .stripe-note, .notice {
    display: flex; gap: 0.6rem; align-items: flex-start;
    margin-top: 1rem; font-size: 0.8rem; color: var(--ink-3);
  }
  .notice { padding-top: 1.1rem; border-top: 1px solid var(--line); font-size: 0.83rem; color: var(--ink-2); }
  .notice svg, .stripe-note svg { flex-shrink: 0; margin-top: 0.15rem; }
  .notice.warn { color: var(--warn); }
  .notice.pos { color: var(--pos); }
  .notice b { color: var(--ink); font-weight: 700; }
  .notice.warn b, .notice.pos b { color: inherit; }

  .cta {
    width: 100%; margin-top: 1.4rem; border: none; cursor: pointer;
    font-weight: 800; font-size: var(--cta-size); padding: 0.95rem 1.5rem;
    border-radius: var(--r-pill); color: var(--accent-ink);
    background: linear-gradient(135deg, var(--glow), var(--accent));
    box-shadow: 0 8px 30px -8px color-mix(in oklab, var(--accent) 70%, transparent);
    transition: transform 140ms var(--ease);
  }
  .cta:hover:not(:disabled) { transform: translateY(-1px); }
  .cta:active:not(:disabled) { transform: scale(0.99); }
  .cta:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .cta:disabled { background: var(--glass-2); color: var(--ink-3); box-shadow: none; cursor: not-allowed; }

  .overlay {
    position: fixed; inset: 0; z-index: 80; background: rgba(5,5,7,0.92);
    backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; text-align: center;
  }
  .overlay.on { display: flex; }
  .spin {
    width: 2.4rem; height: 2.4rem; margin: 0 auto 1.1rem; border-radius: 50%;
    border: 2px solid var(--glass-2); border-top-color: var(--accent);
    animation: spin 700ms linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay p { margin: 0; font-weight: 700; }
  .overlay small { color: var(--ink-3); }
  @media (prefers-reduced-motion: reduce) { .spin { animation-duration: 2s; } }

  /* Demo */
  .demo-bar {
    position: fixed; bottom: 1rem; left: 1rem; z-index: 60;
    display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
    max-width: calc(100vw - 2rem);
    padding: 0.4rem 0.6rem; border-radius: var(--r-lg);
    background: rgba(18,18,21,0.92); border: 1px solid var(--line);
    backdrop-filter: blur(12px); font-size: 0.7rem; color: var(--ink-3);
    opacity: 0.45; transition: opacity var(--dur) ease;
  }
  .demo-bar:hover, .demo-bar:focus-within { opacity: 1; }
  .demo-bar b { color: var(--ink-2); font-weight: 600; }
  .swatch { width: 1.4rem; height: 1.4rem; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
  .swatch.on { border-color: #fff; }
  .swatch.sunset { background: linear-gradient(135deg,#ff6b4a,#ffc46b); }
  .swatch.acid { background: linear-gradient(135deg,#103d2a,#c6f543); }
  .swatch.midnight { background: linear-gradient(135deg,#2b1f6e,#4da6ff); }
  .fdiv { width: 1px; height: 1.1rem; background: var(--line); margin: 0 0.1rem; }
  .tgl {
    height: 1.5rem; padding: 0 0.55rem; border-radius: var(--r-pill);
    border: 1px solid var(--line); background: transparent; color: var(--ink-3);
    font-size: 0.68rem; font-weight: 600; cursor: pointer;
    transition: color var(--dur) ease, border-color var(--dur) ease;
  }
  .tgl:hover { color: var(--ink-2); }
  .tgl.on { color: var(--ink); border-color: #fff; }
  @media (max-width: 860px) {
    .demo-bar { bottom: auto; top: 4.1rem; left: 50%; transform: translateX(-50%); }
    .demo-bar b { display: none; }
    .wrap { padding-top: 5rem; }
  }

  @media (prefers-reduced-motion: no-preference) {
    .view { animation: rise 300ms var(--ease) both; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  }

          &lt;input id=&quot;card&quot; inputmode=&quot;numeric&quot; placeholder=&quot;1234 1234 1234 1234&quot; autocomplete=&quot;cc-number&quot;&gt;
        &lt;/div&gt;
        &lt;div class=&quot;field-row&quot;&gt;
          &lt;div class=&quot;field&quot;&gt;
            &lt;label for=&quot;exp&quot;&gt;Expiry&lt;/label&gt;
            &lt;input id=&quot;exp&quot; inputmode=&quot;numeric&quot; placeholder=&quot;MM / YY&quot; autocomplete=&quot;cc-exp&quot;&gt;
          &lt;/div&gt;
          &lt;div class=&quot;field&quot;&gt;
            &lt;label for=&quot;cvc&quot;&gt;CVC&lt;/label&gt;
            &lt;input id=&quot;cvc&quot; inputmode=&quot;numeric&quot; placeholder=&quot;123&quot; autocomplete=&quot;cc-csc&quot;&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;p class=&quot;stripe-note&quot;&gt;
          &lt;svg width=&quot;13&quot; height=&quot;13&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;
            &lt;rect x=&quot;4&quot; y=&quot;10.5&quot; width=&quot;16&quot; height=&quot;9.5&quot; rx=&quot;2&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;/&gt;
            &lt;path d=&quot;M8 10.5V7.8a4 4 0 0 1 8 0v2.7&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot; stroke-linecap=&quot;round&quot;/&gt;
          &lt;/svg&gt;
          Payments are processed securely by Stripe. Bumpy never sees your card.

      &lt;/div&gt;

      &lt;p class=&quot;notice pos&quot; id=&quot;free-note&quot; hidden style=&quot;border-top:none; padding-top:0;&quot;&gt;
        &lt;svg width=&quot;15&quot; height=&quot;15&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;
          &lt;path d=&quot;M5 13l4 4L19 7&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;/&gt;
        &lt;/svg&gt;
        &lt;span id=&quot;free-note-txt&quot;&gt;&lt;/span&gt;
      &lt;/p&gt;

      &lt;button class=&quot;cta&quot; id=&quot;cta-pay&quot;&gt;Pay 1,900 THB&lt;/button&gt;

      &lt;p class=&quot;notice warn&quot; id=&quot;approval-note&quot; hidden&gt;
        &lt;svg width=&quot;15&quot; height=&quot;15&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;
          &lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;9&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;/&gt;
          &lt;path d=&quot;M12 7.6V12l2.6 1.6&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot; stroke-linecap=&quot;round&quot;/&gt;
        &lt;/svg&gt;
        &lt;span id=&quot;approval-txt&quot;&gt;&lt;/span&gt;
      &lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/main&gt;

&lt;div class=&quot;overlay&quot; id=&quot;overlay&quot; role=&quot;status&quot; aria-live=&quot;polite&quot;&gt;
  &lt;div&gt;
    &lt;div class=&quot;spin&quot; aria-hidden=&quot;true&quot;&gt;&lt;/div&gt;
    &lt;p&gt;Processing payment…&lt;/p&gt;
    &lt;small&gt;Please don't close this window&lt;/small&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- Closing checkout releases the held reservation, so ✕ confirms first
     (production's requestLeaveCheckout). Back stays in-funnel and doesn't warn. --&gt;
&lt;div class=&quot;overlay&quot; id=&quot;leave&quot; role=&quot;dialog&quot; aria-modal=&quot;true&quot; aria-labelledby=&quot;leave-t&quot;&gt;
  &lt;div style=&quot;max-width:22rem; padding:0 1.5rem;&quot;&gt;
    &lt;p id=&quot;leave-t&quot; style=&quot;font-size:1.1rem; margin:0 0 0.4rem;&quot;&gt;Leave checkout?&lt;/p&gt;
    &lt;small style=&quot;display:block; margin-bottom:1.3rem;&quot;&gt;Your tickets are held for 10 minutes. Leaving releases them.&lt;/small&gt;
    &lt;button class=&quot;cta&quot; id=&quot;leave-stay&quot; style=&quot;margin:0 0 0.6rem;&quot;&gt;Keep my tickets&lt;/button&gt;
    &lt;button class=&quot;backlink&quot; id=&quot;leave-go&quot; style=&quot;margin:0 auto; display:block;&quot;&gt;Leave anyway&lt;/button&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;demo-bar&quot;&gt;
  &lt;b&gt;Mode&lt;/b&gt;
  &lt;button class=&quot;tgl on&quot; id=&quot;m-group&quot; data-mode=&quot;group&quot;&gt;Group&lt;/button&gt;
  &lt;button class=&quot;tgl&quot; id=&quot;m-individual&quot; data-mode=&quot;individual&quot;&gt;Individual&lt;/button&gt;
  &lt;span class=&quot;fdiv&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;
  &lt;button class=&quot;tgl on&quot; id=&quot;t-profile&quot; aria-pressed=&quot;true&quot;&gt;Profile done&lt;/button&gt;
  &lt;button class=&quot;tgl&quot; id=&quot;t-under18&quot; aria-pressed=&quot;false&quot;&gt;Buyer under 18&lt;/button&gt;
  &lt;button class=&quot;tgl&quot; id=&quot;t-fees&quot; aria-pressed=&quot;false&quot;&gt;Fees&lt;/button&gt;
  &lt;button class=&quot;tgl&quot; id=&quot;t-free&quot; aria-pressed=&quot;false&quot;&gt;Free&lt;/button&gt;
  &lt;button class=&quot;tgl&quot; id=&quot;t-approval&quot; aria-pressed=&quot;false&quot;&gt;Approval&lt;/button&gt;
&lt;/div&gt;

&lt;script&gt;
  /* ---- Cross-page navigation ------------------------------------------
     The four mockups are separate files. Navigate between them relatively
     when opened locally (all in one folder), or by artifact URL when viewed
     on claude.ai — so the flow connects in both places. */
  const NAV = (() =&gt; {
    const A = {
      event:    &quot;https://claude.ai/code/artifact/77f4ef1f-f3a4-4ee2-b89b-02127d17edc5&quot;,
      select:   &quot;https://claude.ai/code/artifact/47fb6c2a-121e-4972-95a6-8c5a9e8bae19&quot;,
      checkout: &quot;https://claude.ai/code/artifact/c7332fcc-5b94-40ac-9f12-b3026e750ccb&quot;,
      confirm:  &quot;https://claude.ai/code/artifact/44ecbc66-1bd3-4ce2-a6bc-829459ae7cd8&quot;,
    };
    const R = {
      event:    &quot;bumpy-event-page-mockup.html&quot;,
      select:   &quot;bumpy-ticket-selection-mockup.html&quot;,
      checkout: &quot;bumpy-checkout-mockup.html&quot;,
      confirm:  &quot;bumpy-confirmation-mockup.html&quot;,
    };
    const onArtifact = /(^|\.)claude\.ai$/.test(location.hostname);
    return (key) =&gt; {
      // inside the combined flow shell: switch views without navigating
      try { if (window.parent &amp;&amp; window.parent !== window) { window.parent.postMessage({ bumpyNav: key }, &quot;*&quot;); return; } } catch (e) {}
      window.location.href = (onArtifact ? A : R)[key];
    };
  })();

  const $ = (id) =&gt; document.getElementById(id);

  /* ---- Order carried from the Choose Ticket step ----------------------
     Each line: { name, category, qty, unit }. When this page is opened on
     its own (no order handed over), fall back to a representative order so
     it still reads as a complete page. */
  const DEFAULT_ORDER = { items: [
    { name: &quot;Early bird&quot;, category: null, qty: 2, unit: 500 },
    { name: &quot;Deck entry&quot;, category: &quot;VIP Sunset Deck&quot;, qty: 1, unit: 900 },
  ] };
  let ORDER = DEFAULT_ORDER;
  const orderCount = () =&gt; ORDER.items.reduce((s, i) =&gt; s + i.qty, 0);
  const orderSub = () =&gt; ORDER.items.reduce((s, i) =&gt; s + i.qty * i.unit, 0);

  window.addEventListener(&quot;message&quot;, (e) =&gt; {
    const o = e.data &amp;&amp; e.data.bumpyOrder;
    if (o &amp;&amp; Array.isArray(o.items) &amp;&amp; o.items.length) {
      ORDER = o;
      buildAttendees();   // attendee slots follow the chosen tickets
      render();
    }
  });

  /* ==================================================================
     Production logic (CheckoutPageClient.tsx):
       isIndividualMode         = event.dealType === &quot;individual&quot;
       requiresGroupAgeCorrection = !individual &amp;&amp; hasAgeRestriction
                                    &amp;&amp; profileComplete &amp;&amp; buyerAge &lt; ageLimit
       requiresAttendeeDetails  = isIndividualMode || requiresGroupAgeCorrection
       getInitialPaySubStep()   = !profileComplete ? &quot;profile&quot;
                                : requiresAttendeeDetails ? &quot;attendees&quot;
                                : &quot;payment&quot;
     Group + no age issue therefore has NO attendee step at all.
     ================================================================== */
  /* `profile` holds what the buyer actually submitted this session — production's
     `profileData`, which also short-circuits isProfileComplete to true. */
  const state = { mode: &quot;group&quot;, profileDone: true, under18: false, view: &quot;payment&quot;, profile: null };

  const isIndividual = () =&gt; state.mode === &quot;individual&quot;;

  /* The saved profile wins; otherwise fall back to the demo's stored customer. */
  function buyerProfile() {
    return state.profile || {
      first: &quot;Eldar&quot;, last: &quot;Tsabari&quot;, email: &quot;eldar@example.com&quot;,
      dob: state.under18 ? DOB_UNDER : DOB_OK, gender: &quot;male&quot;,
    };
  }
  const buyerDob = () =&gt; buyerProfile().dob;

  /* Group + age-restricted event + the BUYER is under the limit → collect the
     main attendee so the age can be corrected. Judged from the buyer's real
     birth date, so a date just typed into the profile form drives the routing
     (production: getRequiresAttendeeDetailsForProfile(submittedProfile)). */
  function requiresGroupAgeCorrection() {
    if (isIndividual()) return false;
    const a = ageAt(buyerDob(), EVENT_START);
    return a !== null &amp;&amp; a &lt; AGE_LIMIT;
  }
  const requiresAttendeeDetails = () =&gt; isIndividual() || requiresGroupAgeCorrection();

  /* Routing — mirrors getInitialPaySubStep() + the advance effect:
       !profileComplete            → profile
       requiresAttendeeDetails     → attendees
       otherwise                   → payment
     Individual ALWAYS gets attendees; group only when the buyer is under-age. */
  const stepAfterProfile = () =&gt; (requiresAttendeeDetails() ? &quot;attendees&quot; : &quot;payment&quot;);
  const initialView = () =&gt;
    !state.profileDone ? &quot;profile&quot; : stepAfterProfile();

  /* Attendee groups — built from cart items in production (one slot per ticket).
     individual → every ticket needs an attendee (AttendeesList mode=&quot;all&quot;)
     under-age  → a single synthetic &quot;Main attendee&quot; group, quantity 1,
                  prefilled from the profile (mode=&quot;primary&quot;) */
  const EVENT_START = &quot;2026-07-15&quot;;   // age is measured at the event date
  const AGE_LIMIT = 18;               // event.age_limit — the event is 18+
  /* The &quot;Buyer under 18&quot; toggle must change the buyer's actual birth date,
     not just the routing — that date is what prefills the main attendee and
     what the age check judges. 2012 → 14 at the event; 1997 → 29. */
  const DOB_UNDER = &quot;2012-01-01&quot;;
  const DOB_OK = &quot;1997-04-12&quot;;

  /* A ticket that belongs to a category reads &quot;Category/Ticket&quot;. On the
     selection page the category is an accordion, so the nesting is visual;
     in checkout that hierarchy is gone, so the category has to travel inline
     with the name or &quot;Deck entry&quot; loses its context. */
  const ticketLabel = (t) =&gt; (t.category ? `${t.category}/${t.ticketName}` : t.ticketName);

  function attendeeGroups() {
    /* Individual: one attendee per ticket, grouped by ticket type (mode &quot;all&quot;).
       Group: a single &quot;Main attendee&quot; prefilled from the profile (mode &quot;primary&quot;)
       — required only for age correction, but always REACHABLE so a repeat buyer
       can review or fix their details at purchase time. */
    if (isIndividual()) {
      // one attendee slot per ticket, grouped by type; the very first slot
      // overall is prefilled from the buyer's profile
      let prefilled = false;
      return ORDER.items.map((i) =&gt; ({
        ticketName: i.name, category: i.category, quantity: i.qty,
        rows: Array.from({ length: i.qty }, () =&gt; {
          if (!prefilled) { prefilled = true; return { prefill: true }; }
          return {};
        }),
      }));
    }
    return [{ ticketName: &quot;Main attendee&quot;, category: null, quantity: 1, rows: [{ prefill: true }] }];
  }

  function ageAt(dob, target) {
    if (!dob) return null;
    const t = new Date(target), b = new Date(dob + &quot;T00:00:00&quot;);
    if (isNaN(t) || isNaN(b)) return null;
    let a = t.getFullYear() - b.getFullYear();
    const m = t.getMonth() - b.getMonth();
    if (m &lt; 0 || (m === 0 &amp;&amp; t.getDate() &lt; b.getDate())) a--;
    return a;
  }

  /* Production isAttendeeDataValid: all five fields, plus age &gt;= ageLimit at
     the event date when the event has an age restriction. */
  function panelValid(panel) {
    const vals = [...panel.querySelectorAll(&quot;.a-in&quot;)];
    if (!vals.every((e) =&gt; e.value.trim() !== &quot;&quot;)) return false;
    const dob = panel.querySelector('input[type=&quot;date&quot;]').value;
    const a = ageAt(dob, EVENT_START);
    return a !== null &amp;&amp; a &gt;= AGE_LIMIT;
  }

  const ICON_CHECK = '&lt;svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;&lt;path d=&quot;M5 13l4 4L19 7&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2.4&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;/svg&gt;';
  const ICON_PERSON = '&lt;svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;&lt;circle cx=&quot;12&quot; cy=&quot;8&quot; r=&quot;3.4&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.8&quot;/&gt;&lt;path d=&quot;M5.5 19.5a6.5 6.5 0 0 1 13 0&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot;/&gt;&lt;/svg&gt;';

  function buildAttendees() {
    const wrap = $(&quot;att-list&quot;);
    wrap.innerHTML = &quot;&quot;;
    const groups = attendeeGroups();
    const p = buyerProfile();   // attendee 1 mirrors the buyer's saved profile
    const GENDERS = [[&quot;male&quot;, &quot;Male&quot;], [&quot;female&quot;, &quot;Female&quot;], [&quot;other&quot;, &quot;Other&quot;]];
    let n = 0;

    groups.forEach((g) =&gt; {
      // production: ticket-type header only when there's more than one group
      if (groups.length &gt; 1) {
        const h = document.createElement(&quot;p&quot;);
        h.className = &quot;grp-hd&quot;;
        h.textContent = `${ticketLabel(g)} (${g.quantity} ${g.quantity === 1 ? &quot;ticket&quot; : &quot;tickets&quot;})`;
        wrap.appendChild(h);
      }
      g.rows.forEach((row) =&gt; {
        const idx = n++;
        const id = &quot;at&quot; + idx;
        const el = document.createElement(&quot;div&quot;);
        el.className = &quot;att-acc&quot;;
        el.dataset.idx = idx;
        // built collapsed; autoExpand() below opens the first one that needs work
        const open = false;
        el.innerHTML = `
          &lt;button type=&quot;button&quot; class=&quot;att-hd&quot; aria-expanded=&quot;${open}&quot; aria-controls=&quot;${id}b&quot;&gt;
            &lt;span class=&quot;att-ico&quot; aria-hidden=&quot;true&quot;&gt;${ICON_PERSON}&lt;/span&gt;
            &lt;span class=&quot;att-nm&quot;&gt;&lt;/span&gt;
            &lt;svg class=&quot;att-chev&quot; width=&quot;17&quot; height=&quot;17&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;
              &lt;path d=&quot;M6 9l6 6 6-6&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.9&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;/&gt;
            &lt;/svg&gt;
          &lt;/button&gt;
          &lt;div class=&quot;att-body ${open ? &quot;open&quot; : &quot;&quot;}&quot; id=&quot;${id}b&quot;&gt;
            &lt;div&gt;&lt;div class=&quot;att-well&quot;&gt;
              &lt;div class=&quot;field-row&quot;&gt;
                &lt;div class=&quot;field&quot;&gt;
                  &lt;label for=&quot;${id}f&quot;&gt;First name&lt;/label&gt;
                  &lt;input id=&quot;${id}f&quot; class=&quot;a-in&quot; value=&quot;${row.prefill ? p.first : &quot;&quot;}&quot; placeholder=&quot;First name&quot;&gt;
                &lt;/div&gt;
                &lt;div class=&quot;field&quot;&gt;
                  &lt;label for=&quot;${id}l&quot;&gt;Last name&lt;/label&gt;
                  &lt;input id=&quot;${id}l&quot; class=&quot;a-in&quot; value=&quot;${row.prefill ? p.last : &quot;&quot;}&quot; placeholder=&quot;Last name&quot;&gt;
                &lt;/div&gt;
              &lt;/div&gt;
              &lt;div class=&quot;field&quot;&gt;
                &lt;label for=&quot;${id}e&quot;&gt;Email&lt;/label&gt;
                &lt;input id=&quot;${id}e&quot; class=&quot;a-in&quot; type=&quot;email&quot; value=&quot;${row.prefill ? p.email : &quot;&quot;}&quot; placeholder=&quot;name@email.com&quot;&gt;
              &lt;/div&gt;
              &lt;div class=&quot;field-row&quot;&gt;
                &lt;div class=&quot;field&quot;&gt;
                  &lt;label for=&quot;${id}d&quot;&gt;Date of birth&lt;/label&gt;
                  &lt;input id=&quot;${id}d&quot; class=&quot;a-in&quot; type=&quot;date&quot; value=&quot;${row.prefill ? p.dob : &quot;&quot;}&quot; aria-describedby=&quot;${id}de&quot;&gt;
                  &lt;p class=&quot;f-err&quot; id=&quot;${id}de&quot; role=&quot;alert&quot;&gt;
                    &lt;svg width=&quot;13&quot; height=&quot;13&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;
                      &lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;9&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.9&quot;/&gt;
                      &lt;path d=&quot;M12 7.5v5&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.9&quot; stroke-linecap=&quot;round&quot;/&gt;
                      &lt;circle cx=&quot;12&quot; cy=&quot;16.3&quot; r=&quot;1&quot; fill=&quot;currentColor&quot;/&gt;
                    &lt;/svg&gt;
                    &lt;span&gt;Must be ${AGE_LIMIT} or older&lt;/span&gt;
                  &lt;/p&gt;
                &lt;/div&gt;
                &lt;div class=&quot;field&quot;&gt;
                  &lt;label for=&quot;${id}g&quot;&gt;Gender&lt;/label&gt;
                  &lt;select id=&quot;${id}g&quot; class=&quot;a-in&quot;&gt;
                    &lt;option value=&quot;&quot; ${row.prefill &amp;&amp; p.gender ? &quot;&quot; : &quot;selected&quot;} disabled&gt;Select&lt;/option&gt;
                    ${GENDERS.map(([v, t]) =&gt;
                      `&lt;option value=&quot;${v}&quot; ${row.prefill &amp;&amp; p.gender === v ? &quot;selected&quot; : &quot;&quot;}&gt;${t}&lt;/option&gt;`
                    ).join(&quot;&quot;)}
                  &lt;/select&gt;
                &lt;/div&gt;
              &lt;/div&gt;
            &lt;/div&gt;&lt;/div&gt;
          &lt;/div&gt;`;
        wrap.appendChild(el);

        el.querySelector(&quot;.att-hd&quot;).addEventListener(&quot;click&quot;, () =&gt; {
          const hd = el.querySelector(&quot;.att-hd&quot;);
          const nowOpen = hd.getAttribute(&quot;aria-expanded&quot;) !== &quot;true&quot;;
          hd.setAttribute(&quot;aria-expanded&quot;, String(nowOpen));
          el.querySelector(&quot;.att-body&quot;).classList.toggle(&quot;open&quot;, nowOpen);
        });
        el.querySelectorAll(&quot;.a-in&quot;).forEach((i) =&gt; {
          i.addEventListener(&quot;input&quot;, render);
          i.addEventListener(&quot;change&quot;, render);
        });
      });
    });

    autoExpand();
  }

  /* Open the first panel that still needs work, and only that one.
     Attendee 1 is usually prefilled and valid, so it collapses and the form
     opens on attendee 2 — the first thing you actually have to fill.
     If attendee 1 is invalid (e.g. the buyer is under-age), it stays open
     because that's the panel to fix. Runs on build only, never on keystroke,
     so panels don't jump around while you type. */
  function autoExpand() {
    const panels = [...$(&quot;att-list&quot;).querySelectorAll(&quot;.att-acc&quot;)];
    const target = panels.find((p) =&gt; !panelValid(p));
    panels.forEach((p) =&gt; {
      const open = p === target;
      p.querySelector(&quot;.att-hd&quot;).setAttribute(&quot;aria-expanded&quot;, String(open));
      p.querySelector(&quot;.att-body&quot;).classList.toggle(&quot;open&quot;, open);
    });
  }

  const profileValid = () =&gt;
    state.profileDone || [...document.querySelectorAll(&quot;.p-in&quot;)].every((e) =&gt; e.value.trim() !== &quot;&quot;);

  /* Panel headers mirror production: status icon (check when valid, person when
     not), typed name or &quot;Attendee N&quot;, &quot;(You)&quot; on the first panel overall. */
  function refreshPanels() {
    const panels = [...$(&quot;att-list&quot;).querySelectorAll(&quot;.att-acc&quot;)];
    let complete = 0;
    panels.forEach((p, i) =&gt; {
      const ok = panelValid(p);
      if (ok) complete++;
      p.classList.toggle(&quot;valid&quot;, ok);
      p.querySelector(&quot;.att-ico&quot;).innerHTML = ok ? ICON_CHECK : ICON_PERSON;

      /* Age is measured at the EVENT date, not today — so the error names that
         date. Only fires once a date is entered; empty is not an error. */
      const dobEl = p.querySelector('input[type=&quot;date&quot;]');
      const a = ageAt(dobEl.value, EVENT_START);
      const underage = dobEl.value !== &quot;&quot; &amp;&amp; a !== null &amp;&amp; a &lt; AGE_LIMIT;
      dobEl.classList.toggle(&quot;bad&quot;, underage);
      dobEl.setAttribute(&quot;aria-invalid&quot;, String(underage));
      p.querySelector(&quot;.f-err&quot;).classList.toggle(&quot;on&quot;, underage);
      const first = p.querySelector('input[id$=&quot;f&quot;]').value.trim();
      const last = p.querySelector('input[id$=&quot;l&quot;]').value.trim();
      const name = [first, last].filter(Boolean).join(&quot; &quot;) || `Attendee ${i + 1}`;
      p.querySelector(&quot;.att-nm&quot;).innerHTML =
        name + (i === 0 ? &quot; &lt;em&gt;(You)&lt;/em&gt;&quot; : &quot;&quot;);
    });
    return { complete, total: panels.length };
  }
  function attendeeStats() { return refreshPanels(); }

  /* ---------------- Totals (fee is carved out, never added) ---------------- */
  const FEE_PER_TICKET = 38, DISC_RATE = 0.2;
  let coupon = false;
  const fmt = (n) =&gt; Math.round(n).toLocaleString(&quot;en-US&quot;) + &quot; THB&quot;;
  const itemLabel = (i) =&gt; (i.category ? `${i.category}/${i.name}` : i.name);

  /* Summary line per chosen ticket type, with an optional discount sub-line. */
  function renderOrderItems(showDisc) {
    $(&quot;ord-items&quot;).innerHTML = ORDER.items.map((i) =&gt; {
      const line = i.qty * i.unit;
      const row = `&lt;div class=&quot;ord-row item&quot;&gt;&lt;span class=&quot;n&quot;&gt;&lt;b&gt;${i.qty}&lt;/b&gt; ${itemLabel(i)}&lt;/span&gt;&lt;span class=&quot;v&quot;&gt;${fmt(line)}&lt;/span&gt;&lt;/div&gt;`;
      const dl = showDisc
        ? `&lt;div class=&quot;ord-line-disc&quot;&gt;&lt;span&gt;SUNSET20 - 20%&lt;/span&gt;&lt;span&gt;-${fmt(line * DISC_RATE)}&lt;/span&gt;&lt;/div&gt;`
        : &quot;&quot;;
      return row + dl;
    }).join(&quot;&quot;);
  }

  function render() {
    const free = $(&quot;t-free&quot;).classList.contains(&quot;on&quot;);
    const approval = $(&quot;t-approval&quot;).classList.contains(&quot;on&quot;);
    const feesOn = $(&quot;t-fees&quot;).classList.contains(&quot;on&quot;);

    // ---- summary
    const SUB = orderSub(), TICKETS = orderCount(), FEE = FEE_PER_TICKET * TICKETS;
    const showDisc = coupon &amp;&amp; !free;
    const showFees = feesOn &amp;&amp; !free;
    const disc = coupon ? SUB * DISC_RATE : 0;
    const fee = showFees ? FEE : 0;
    const subBeforeFees = showFees ? SUB - FEE : SUB;
    const total = free ? 0 : Math.max(0, Math.round(subBeforeFees + fee - disc));

    $(&quot;ord-count&quot;).textContent = `${TICKETS} ${TICKETS === 1 ? &quot;ticket&quot; : &quot;tickets&quot;}`;
    renderOrderItems(showDisc);
    $(&quot;breakdown&quot;).hidden = !(showDisc || showFees);
    $(&quot;sub-label&quot;).textContent = showFees ? &quot;Ticket subtotal&quot; : &quot;Subtotal&quot;;
    $(&quot;sub-v&quot;).textContent = fmt(subBeforeFees);
    $(&quot;fee-row&quot;).hidden = !showFees;
    $(&quot;fee-v&quot;).textContent = fmt(fee);
    $(&quot;disc-row&quot;).hidden = !showDisc;
    $(&quot;disc-v&quot;).textContent = &quot;-&quot; + fmt(disc);
    $(&quot;total-v&quot;).textContent = free ? &quot;Free&quot; : fmt(total);
    $(&quot;coupon-input-wrap&quot;).hidden = coupon;
    $(&quot;code-chip&quot;).hidden = !coupon;

    // ---- attendees view
    // the age policy belongs to the event, so it shows whenever there's a limit —
    // not only when someone has already failed it
    $(&quot;age-note&quot;).hidden = !(AGE_LIMIT &gt; 0);
    const s = attendeeStats();
    $(&quot;att-count&quot;).textContent = `${s.complete}/${s.total} complete`;
    $(&quot;att-sub&quot;).textContent = isIndividual()
      ? &quot;Enter details for each ticket holder&quot;
      : requiresGroupAgeCorrection()
        ? &quot;Confirm the main attendee meets the event age requirement&quot;
        : &quot;Review the main attendee's details&quot;;
    $(&quot;cta-attendees&quot;).disabled = s.complete !== s.total;

    // ---- gates
    $(&quot;cta-profile&quot;).disabled = !profileValid();
    /* Payment always offers a way back. Production renders this link only when
       attendees were collected, which leaves a repeat group buyer — who lands
       straight on Payment with a complete profile — with no way to review or
       correct anything. */
    $(&quot;back-attendees&quot;).hidden = false;

    // ---- view 2 identity follows whether money is involved
    $(&quot;step-pay-label&quot;).textContent = free ? &quot;Confirm&quot; : &quot;Pay&quot;;
    $(&quot;pay-title&quot;).textContent = free ? &quot;Confirm&quot; : &quot;Payment&quot;;
    $(&quot;pay-sub&quot;).textContent = free
      ? &quot;Nothing to pay — review and confirm&quot;
      : approval
        ? &quot;We'll hold the amount, not charge it&quot;
        : &quot;Card details are handled by Stripe&quot;;
    $(&quot;pay-form&quot;).hidden = free;
    $(&quot;free-note&quot;).hidden = !free;
    if (free) {
      $(&quot;free-note-txt&quot;).innerHTML = coupon
        ? &quot;&lt;b&gt;No payment required.&lt;/b&gt; Your discount code covers the full amount.&quot;
        : &quot;&lt;b&gt;No payment required.&lt;/b&gt; This is a free registration event.&quot;;
    }
    /* Button text does not change for approval — the hold is explained by the
       notice below it, not by renaming the action. */
    $(&quot;cta-pay&quot;).textContent = free
      ? (approval ? &quot;Submit registration&quot; : &quot;Complete registration&quot;)
      : &quot;Pay &quot; + fmt(total);
    $(&quot;approval-note&quot;).hidden = !approval;
    if (approval) {
      /* Paid + approval uses Stripe capture_method: &quot;manual&quot; — the card is only
         authorised now and captured when the organizer approves. Say that. */
      $(&quot;approval-txt&quot;).innerHTML = free
        ? &quot;&lt;b&gt;The organizer reviews each registration.&lt;/b&gt; You'll get an email when it's confirmed.&quot;
        : &quot;&lt;b&gt;You won't be charged until the organizer approves.&lt;/b&gt; We'll hold the amount on your card and email you either way.&quot;;
    }

    // ---- view switch
    $(&quot;view-profile&quot;).hidden = state.view !== &quot;profile&quot;;
    $(&quot;view-attendees&quot;).hidden = state.view !== &quot;attendees&quot;;
    $(&quot;view-payment&quot;).hidden = state.view !== &quot;payment&quot;;
  }

  function go(view) {
    state.view = view;
    render();
    window.scrollTo({ top: 0, behavior: &quot;smooth&quot; });
  }

  /* ---------------- View transitions ---------------- */
  // Profile → attendees (individual, or group+under-age) → otherwise payment.
  // Production uses getRequiresAttendeeDetailsForProfile(submittedProfile) so the
  // decision uses the birth date just entered, not the stale one.
  $(&quot;cta-profile&quot;).addEventListener(&quot;click&quot;, () =&gt; {
    /* Save the profile (production: submit → profileData set → isProfileComplete
       becomes true), then decide the next step from the birth date JUST entered.
       An under-age date is allowed through here — it routes to attendee details,
       where the main attendee is prefilled with it and the error blocks. */
    state.profile = {
      first: $(&quot;p-first&quot;).value.trim(),
      last: $(&quot;p-last&quot;).value.trim(),
      email: $(&quot;p-email&quot;).value.trim(),
      dob: $(&quot;p-dob&quot;).value,
      gender: $(&quot;p-gender&quot;).value,
    };
    state.profileDone = true;
    $(&quot;t-profile&quot;).classList.add(&quot;on&quot;);
    $(&quot;t-profile&quot;).setAttribute(&quot;aria-pressed&quot;, &quot;true&quot;);
    // keep the demo toggle honest about the saved profile
    const a = ageAt(state.profile.dob, EVENT_START);
    state.under18 = a !== null &amp;&amp; a &lt; AGE_LIMIT;
    $(&quot;t-under18&quot;).classList.toggle(&quot;on&quot;, state.under18);
    $(&quot;t-under18&quot;).setAttribute(&quot;aria-pressed&quot;, String(state.under18));

    buildAttendees();          // attendee 1 now carries the saved details
    go(stepAfterProfile());
  });
  $(&quot;cta-attendees&quot;).addEventListener(&quot;click&quot;, () =&gt; go(&quot;payment&quot;));
  $(&quot;back-attendees&quot;).addEventListener(&quot;click&quot;, () =&gt; go(&quot;attendees&quot;));
  // header back → previous step (Choose Ticket); close → event page
  // Back steps back a page (stays in the funnel, reservation kept, no warning)
  $(&quot;hdr-back&quot;).addEventListener(&quot;click&quot;, () =&gt; NAV(&quot;select&quot;));
  // Close leaves checkout entirely → confirm first, since it releases the hold
  $(&quot;hdr-close&quot;).addEventListener(&quot;click&quot;, () =&gt; $(&quot;leave&quot;).classList.add(&quot;on&quot;));
  $(&quot;leave-stay&quot;).addEventListener(&quot;click&quot;, () =&gt; $(&quot;leave&quot;).classList.remove(&quot;on&quot;));
  $(&quot;leave-go&quot;).addEventListener(&quot;click&quot;, () =&gt; NAV(&quot;event&quot;));

  /* ---------------- Demo controls ---------------- */
  [&quot;m-group&quot;, &quot;m-individual&quot;].forEach((id) =&gt; {
    $(id).addEventListener(&quot;click&quot;, () =&gt; {
      state.mode = $(id).dataset.mode;
      [&quot;m-group&quot;, &quot;m-individual&quot;].forEach((o) =&gt; $(o).classList.toggle(&quot;on&quot;, o === id));
      buildAttendees();
      go(initialView());
    });
  });
  $(&quot;t-profile&quot;).addEventListener(&quot;click&quot;, () =&gt; {
    state.profileDone = !$(&quot;t-profile&quot;).classList.contains(&quot;on&quot;);
    $(&quot;t-profile&quot;).classList.toggle(&quot;on&quot;, state.profileDone);
    $(&quot;t-profile&quot;).setAttribute(&quot;aria-pressed&quot;, String(state.profileDone));
    state.profile = null;                       // back to the stored customer
    if (!state.profileDone) {                   // an incomplete profile starts blank
      [&quot;p-first&quot;, &quot;p-last&quot;, &quot;p-email&quot;, &quot;p-dob&quot;].forEach((i) =&gt; ($(i).value = &quot;&quot;));
      $(&quot;p-gender&quot;).value = &quot;&quot;;
    }
    buildAttendees();
    go(initialView());
  });
  $(&quot;t-under18&quot;).addEventListener(&quot;click&quot;, () =&gt; {
    state.under18 = !$(&quot;t-under18&quot;).classList.contains(&quot;on&quot;);
    $(&quot;t-under18&quot;).classList.toggle(&quot;on&quot;, state.under18);
    $(&quot;t-under18&quot;).setAttribute(&quot;aria-pressed&quot;, String(state.under18));
    state.profile = null;            // the toggle describes the stored customer
    buildAttendees();
    go(initialView());
  });
  [&quot;t-fees&quot;, &quot;t-free&quot;, &quot;t-approval&quot;].forEach((id) =&gt; {
    $(id).addEventListener(&quot;click&quot;, () =&gt; {
      const on = $(id).classList.toggle(&quot;on&quot;);
      $(id).setAttribute(&quot;aria-pressed&quot;, String(on));
      render();
    });
  });
  document.querySelectorAll(&quot;.p-in&quot;).forEach((el) =&gt; {
    el.addEventListener(&quot;input&quot;, render);
    el.addEventListener(&quot;change&quot;, render);
  });

  /* ---------------- Coupon ---------------- */
  const codeEl = $(&quot;code&quot;);
  codeEl.addEventListener(&quot;input&quot;, () =&gt; {
    codeEl.value = codeEl.value.toUpperCase();
    $(&quot;code-err&quot;).hidden = true;
    $(&quot;code-apply&quot;).disabled = codeEl.value.trim() === &quot;&quot;;
  });
  codeEl.addEventListener(&quot;keydown&quot;, (e) =&gt; { if (e.key === &quot;Enter&quot;) { e.preventDefault(); applyCode(); } });
  function applyCode() {
    const v = codeEl.value.trim();
    if (!v) return;
    if (v === &quot;SUNSET20&quot;) { coupon = true; codeEl.value = &quot;&quot;; $(&quot;code-apply&quot;).disabled = true; }
    else $(&quot;code-err&quot;).hidden = false;
    render();
  }
  $(&quot;code-apply&quot;).addEventListener(&quot;click&quot;, applyCode);
  $(&quot;code-remove&quot;).addEventListener(&quot;click&quot;, () =&gt; { coupon = false; render(); });

  /* ---------------- Timer ---------------- */
  const TOTAL = 600; let left = 600;
  function tick() {
    const m = Math.floor(left / 60), s = left % 60;
    $(&quot;timer-txt&quot;).textContent = `${String(m).padStart(2,&quot;0&quot;)}:${String(s).padStart(2,&quot;0&quot;)}`;
    $(&quot;timer-fill&quot;).style.width = (left / TOTAL) * 100 + &quot;%&quot;;
    $(&quot;timer&quot;).classList.toggle(&quot;warn&quot;, left &lt;= 120);
    if (left &gt; 0) left--;
  }
  tick(); setInterval(tick, 1000);

  /* ---------------- Submit ---------------- */
  $(&quot;cta-pay&quot;).addEventListener(&quot;click&quot;, () =&gt; {
    const free = $(&quot;t-free&quot;).classList.contains(&quot;on&quot;);
    $(&quot;overlay&quot;).querySelector(&quot;p&quot;).textContent = free ? &quot;Submitting registration…&quot; : &quot;Processing payment…&quot;;
    $(&quot;overlay&quot;).classList.add(&quot;on&quot;);
    setTimeout(() =&gt; NAV(&quot;confirm&quot;), 1600);
  });

  buildAttendees();
  state.view = initialView();
  render();
&lt;/script&gt;

&lt;style&gt;
  :root {
    /* ---- Surfaces: the depth ladder. well &lt; bg &lt; glass (recessed → floating) */
    --bg: #0a0a0c;

    --sky-a: #0e1f3a; --sky-b: #2a63b8; --sky-c: #7fd6ec; --sea: #0a1526; /* blue poster; accent stays orange */
  }

    --accent: #c6f543; --glow: #59f0c6; --accent-ink: #101a02;

  }
  [data-event-theme=&quot;midnight&quot;] {

  .ev-line {
    margin: 1.1rem auto 0; text-align: center;

    font-size: 0.85rem; color: var(--warn);
  }
  .notice svg { flex-shrink: 0; margin-top: 0.15rem; }
  .notice b { display: block; margin-bottom: 0.15rem; }

  /* ============================================================ ORDER */
  .lbl {
    font-size: var(--label); font-weight: 700; text-transform: uppercase;

  .sum-row {

  /* ============================================================ ACTIONS */

    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(8px);
    z-index: 70; background: var(--ink); color: #111;
    font-size: 0.84rem; font-weight: 650; padding: 0.6rem 1.1rem;
    border-radius: var(--r-pill); opacity: 0; pointer-events: none;
    transition: opacity var(--dur) ease, transform var(--dur) var(--ease);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Demo */
  .demo-bar {
    position: fixed; bottom: 1rem; left: 1rem; z-index: 60;
    display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
    padding: 0.4rem 0.6rem; border-radius: var(--r-lg);
    background: rgba(18,18,21,0.92); border: 1px solid var(--line);
    backdrop-filter: blur(12px); font-size: 0.7rem; color: var(--ink-3);
    opacity: 0.45; transition: opacity var(--dur) ease;
  }
  .demo-bar:hover, .demo-bar:focus-within { opacity: 1; }
  .demo-bar b { color: var(--ink-2); font-weight: 600; }
  .swatch { width: 1.4rem; height: 1.4rem; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
  .swatch.on { border-color: #fff; }
  .swatch.sunset { background: linear-gradient(135deg,#ff6b4a,#ffc46b); }
  .swatch.acid { background: linear-gradient(135deg,#103d2a,#c6f543); }
  .swatch.midnight { background: linear-gradient(135deg,#2b1f6e,#4da6ff); }
  .fdiv { width: 1px; height: 1.1rem; background: var(--line); margin: 0 0.1rem; }
  .tgl {
    height: 1.5rem; padding: 0 0.55rem; border-radius: var(--r-pill);
    border: 1px solid var(--line); background: transparent; color: var(--ink-3);
    font-size: 0.68rem; font-weight: 600; cursor: pointer;
    transition: color var(--dur) ease, border-color var(--dur) ease;
  }
  .tgl:hover { color: var(--ink-2); }
  .tgl.on { color: var(--ink); border-color: #fff; }
  @media (max-width: 700px) {
    .demo-bar { bottom: auto; top: 4.1rem; left: 50%; transform: translateX(-50%); }
    .demo-bar b { display: none; }
    .wrap { padding-top: 5rem; }
  }

  /* One earned moment: the artwork settles and the stamp lands. */
  @media (prefers-reduced-motion: no-preference) {
    .art { animation: settle 520ms var(--ease) both; }
    .stamp { animation: stamp 420ms var(--ease) 260ms both; }
    .headline, .sub, .ev-line { animation: rise 440ms var(--ease) 160ms both; }
    @keyframes settle { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: none; } }
    @keyframes stamp { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: none; } }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  }
