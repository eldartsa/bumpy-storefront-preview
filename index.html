&lt;script&gt;
  /* ---- Cross-page navigation ------------------------------------------
     The four mockups are separate files. Navigate between them relatively
     when opened locally (all in one folder), or by artifact URL when viewed
     on claude.ai — so the flow connects in both places. */
  const NAV = (() =&gt; {
    const A = {
      event:    &quot;https://claude.ai/code/artifact/77f4ef1f-f3a4-4ee2-b89b-02127d17edc5&quot;,
      select:   &quot;https://claude.ai/code/artifact/47fb6c2a-121e-4972-95a6-8c5a9e8bae19&quot;,
      checkout: &quot;https://claude.ai/code/artifact/c7332fcc-5b94-40ac-9f12-b3026e750ccb&quot;,
      confirm:  &quot;https://claude.ai/code/artifact/44ecbc66-1bd3-4ce2-a6bc-829459ae7cd8&quot;,
    };
    const R = {
      event:    &quot;bumpy-event-page-mockup.html&quot;,
      select:   &quot;bumpy-ticket-selection-mockup.html&quot;,
      checkout: &quot;bumpy-checkout-mockup.html&quot;,
      confirm:  &quot;bumpy-confirmation-mockup.html&quot;,
    };
    const onArtifact = /(^|\.)claude\.ai$/.test(location.hostname);
    return (key) =&gt; {
      // inside the combined flow shell: switch views without navigating
      try { if (window.parent &amp;&amp; window.parent !== window) { window.parent.postMessage({ bumpyNav: key }, &quot;*&quot;); return; } } catch (e) {}
      window.location.href = (onArtifact ? A : R)[key];
    };
  })();

  const $ = (id) =&gt; document.getElementById(id);

  // header close → event page (the bottom &quot;Back to event&quot; does the same)
  $(&quot;hdr-close&quot;).addEventListener(&quot;click&quot;, () =&gt; NAV(&quot;event&quot;));

  /* ---- Order carried from Choose Ticket / Pay -------------------------
     Each line: { name, category, qty, unit }. Standalone (no order handed
     over) falls back to a representative order so the page still reads whole. */
  const DEFAULT_ORDER = { items: [
    { name: &quot;Early bird&quot;, category: null, qty: 2, unit: 500 },
    { name: &quot;Deck entry&quot;, category: &quot;VIP Sunset Deck&quot;, qty: 1, unit: 900 },
  ] };
  let ORDER = DEFAULT_ORDER;
  const orderCount = () =&gt; ORDER.items.reduce((s, i) =&gt; s + i.qty, 0);
  const orderSub = () =&gt; ORDER.items.reduce((s, i) =&gt; s + i.qty * i.unit, 0);
  const itemLabel = (i) =&gt; (i.category ? `${i.category}/${i.name}` : i.name);

  window.addEventListener(&quot;message&quot;, (e) =&gt; {
    const o = e.data &amp;&amp; e.data.bumpyOrder;
    if (o &amp;&amp; Array.isArray(o.items) &amp;&amp; o.items.length) { ORDER = o; render(); }
  });

  /* Demo holder names + ticket numbers, assigned one per ticket. */
  const NAMES = [&quot;Eldar Tsabari&quot;, &quot;Noa Cohen&quot;, &quot;Maya Levi&quot;, &quot;Amit Barak&quot;, &quot;Dana Shaked&quot;,
                 &quot;Yonatan Peled&quot;, &quot;Roni Gal&quot;, &quot;Tomer Katz&quot;];
  const ticketNo = (n) =&gt; &quot;TKT-8F2A&quot; + (41 + n);

  /* Same fee model as the rest of the funnel: the fee is carved OUT of the
     ticket price, so revealing the breakdown never changes the total. */
  const FEE_PER_TICKET = 38, DISC_RATE = 0.2;
  const fmt = (n) =&gt; Math.round(n).toLocaleString(&quot;en-US&quot;) + &quot; THB&quot;;

  /* One .t-row per individual ticket — same type listed separately, each with
     a holder name and ticket number. */
  function renderTicketRows(showDisc) {
    let n = 0;
    const html = [];
    ORDER.items.forEach((i) =&gt; {
      for (let k = 0; k &lt; i.qty; k++) {
        const idx = n++;
        html.push(
          `&lt;div class=&quot;t-row&quot;&gt;
            &lt;div class=&quot;t-top&quot;&gt;
              &lt;span class=&quot;t-name&quot;&gt;${itemLabel(i)}&lt;/span&gt;
              &lt;span class=&quot;t-price&quot;&gt;${fmt(i.unit)}&lt;/span&gt;
            &lt;/div&gt;
            &lt;p class=&quot;t-meta&quot;&gt;&lt;span&gt;${NAMES[idx % NAMES.length]}&lt;/span&gt;&lt;span class=&quot;t-no&quot;&gt;${ticketNo(idx)}&lt;/span&gt;&lt;/p&gt;
            ${showDisc ? `&lt;div class=&quot;t-disc&quot;&gt;&lt;span&gt;SUNSET20 - 20%&lt;/span&gt;&lt;span&gt;-${fmt(i.unit * DISC_RATE)}&lt;/span&gt;&lt;/div&gt;` : &quot;&quot;}
          &lt;/div&gt;`
        );
      }
    });
    $(&quot;t-rows&quot;).innerHTML = html.join(&quot;&quot;);
  }

  function render() {
    const feesOn = $(&quot;t-fees&quot;).classList.contains(&quot;on&quot;);
    const discOn = $(&quot;t-disc&quot;).classList.contains(&quot;on&quot;);
    const free = $(&quot;t-free&quot;).classList.contains(&quot;on&quot;);
    const approval = $(&quot;t-approval&quot;).classList.contains(&quot;on&quot;);

    const SUB = orderSub(), TICKETS = orderCount(), FEE = FEE_PER_TICKET * TICKETS;
    const showDisc = discOn &amp;&amp; !free;
    const disc = showDisc ? SUB * DISC_RATE : 0;
    const showFees = feesOn &amp;&amp; !free;
    const fee = showFees ? FEE : 0;
    const subBeforeFees = showFees ? SUB - FEE : SUB;
    const total = free ? 0 : Math.max(0, Math.round(subBeforeFees + fee - disc));

    $(&quot;oid&quot;).textContent = `#1042 · ${TICKETS} ${TICKETS === 1 ? &quot;ticket&quot; : &quot;tickets&quot;}`;
    renderTicketRows(showDisc);
    $(&quot;breakdown&quot;).hidden = !(showDisc || showFees);
    $(&quot;sub-label&quot;).textContent = showFees ? &quot;Ticket subtotal&quot; : &quot;Subtotal&quot;;
    $(&quot;sub-v&quot;).textContent = fmt(subBeforeFees);
    $(&quot;fee-row&quot;).hidden = !showFees;
    $(&quot;fee-v&quot;).textContent = fmt(fee);
    $(&quot;disc-row&quot;).hidden = !(discOn &amp;&amp; !free);
    $(&quot;disc-v&quot;).textContent = &quot;-&quot; + fmt(disc);
    $(&quot;total-v&quot;).textContent = free ? &quot;Free&quot; : fmt(total);

    // Free orders never went through &quot;Pay&quot;
    $(&quot;step-pay&quot;).textContent = free ? &quot;Confirm&quot; : &quot;Pay&quot;;

    /* Production copy, exactly:
         approval → &quot;Registration submitted&quot; / pending-approval notice
         else     → &quot;Order confirmed&quot; / &quot;Your tickets have been sent to …&quot; */
    $(&quot;headline&quot;).textContent = approval ? &quot;Registration submitted&quot; : &quot;Order confirmed&quot;;
    $(&quot;sub&quot;).innerHTML = approval
      ? 'Your request is pending approval. We\'ll notify you at &lt;b&gt;eldar@example.com&lt;/b&gt; once a decision is made.'
      : 'Your tickets have been sent to &lt;b&gt;eldar@example.com&lt;/b&gt;.';
    $(&quot;approval-note&quot;).hidden = !approval;
    $(&quot;stamp&quot;).classList.toggle(&quot;pending&quot;, approval);
    $(&quot;stamp&quot;).innerHTML = approval
      ? '&lt;svg width=&quot;17&quot; height=&quot;17&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot;&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;9&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;/&gt;&lt;path d=&quot;M12 7.6V12l2.6 1.6&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot;/&gt;&lt;/svg&gt;'
      : '&lt;svg width=&quot;17&quot; height=&quot;17&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot;&gt;&lt;path d=&quot;M5 13l4 4L19 7&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2.6&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;/svg&gt;';
    // tickets only exist once approved
    $(&quot;cta-tickets&quot;).hidden = approval;
  }

  [&quot;t-fees&quot;, &quot;t-disc&quot;, &quot;t-free&quot;, &quot;t-approval&quot;].forEach((id) =&gt; {
    $(id).addEventListener(&quot;click&quot;, () =&gt; {
      const on = $(id).classList.toggle(&quot;on&quot;);
      $(id).setAttribute(&quot;aria-pressed&quot;, String(on));
      render();
    });
  });

  const toast = $(&quot;toast&quot;);
  function say(msg) {
    toast.textContent = msg;
    toast.classList.add(&quot;show&quot;);
    clearTimeout(toast._t);
    toast._t = setTimeout(() =&gt; toast.classList.remove(&quot;show&quot;), 2200);
  }
  $(&quot;cta-tickets&quot;).addEventListener(&quot;click&quot;, () =&gt; say(&quot;→ /profile/tickets&quot;));
  $(&quot;btn-cal&quot;).addEventListener(&quot;click&quot;, () =&gt; say(&quot;→ .ics download&quot;));
  $(&quot;btn-share&quot;).addEventListener(&quot;click&quot;, () =&gt; say(&quot;→ Share the event page&quot;));
  $(&quot;btn-back&quot;).addEventListener(&quot;click&quot;, () =&gt; NAV(&quot;event&quot;));

  render();
&lt;/script&gt;

&lt;style&gt;

    /* Depth ladder — same tokens as the rest of the funnel */
    --bg: #0a0a0c;

  [hidden] { display: none !important; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
    font-family: system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, sans-serif;
    line-height: 1.55; -webkit-font-smoothing: antialiased; overflow-x: hidden;
    display: grid; place-items: center; padding: 5.5rem 1.1rem 3rem;
  }
  /* Login is Bumpy chrome, not an event — the ambient stays neutral, no accent.
     A cool, faint light from the top, nothing that competes with an event's art. */
  .ambient {
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(64vw 42vw at 50% -6%, rgba(255,255,255,0.05), transparent 70%),
      var(--bg);
    mask-image: linear-gradient(to bottom, #000 0%, #000 46%, transparent 82%);
  }

  .shell { width: 100%; max-width: 25.5rem; }


  .card-wrap { position: relative; }

  /* Back — floats above the card, like production */
  .back {
    position: absolute; top: -2.5rem; left: 0.1rem;
    display: inline-flex; align-items: center; gap: 0.45rem;
    background: none; border: none; padding: 0.3rem 0.1rem;
    color: var(--ink-2); font: inherit; font-size: 0.82rem; cursor: pointer;
    transition: color var(--dur) ease, opacity var(--dur) ease;
  }
  .back:hover { color: var(--ink); }
  .back:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; border-radius: 6px; }

  .card {
    background: linear-gradient(180deg, var(--glass), transparent);
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    padding: 1.7rem 1.5rem 1.6rem;
  }

  h1 {
    margin: 0 0 0.45rem; text-align: center;
    font-size: 1.12rem; font-weight: 700; letter-spacing: 0.005em;
  }
  .sub {
    margin: 0 auto 1.4rem; text-align: center; max-width: 20rem;
    color: var(--ink-2); font-size: 0.86rem;
  }

  label.fld { display: block; font-size: var(--label); letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink-3); margin-bottom: 0.5rem; }

  /* Phone input: country pill + number, one control row */
  .phone {
    display: flex; align-items: stretch; gap: 0.5rem;
  }
  .cc {
    position: relative; display: flex; align-items: center; gap: 0.4rem;
    background: var(--glass); border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 0 0.7rem; height: 3.05rem;
    color: var(--ink); font-size: 0.92rem; white-space: nowrap;
    transition: border-color var(--dur) ease;
  }
  .cc:focus-within { border-color: color-mix(in oklab, var(--ink) 40%, transparent); }
  .cc .flag { font-size: 1.05rem; line-height: 1; }
  .cc select {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
  }
  .cc .chev { color: var(--ink-3); }
  .num {
    flex: 1; min-width: 0; height: 3.05rem;
    background: var(--glass); border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 0 0.95rem; color: var(--ink);
    font: inherit; font-size: 0.98rem; font-variant-numeric: tabular-nums;
    transition: border-color var(--dur) ease, background var(--dur) ease;
  }
  .num::placeholder { color: var(--ink-3); }
  .num:focus { outline: none; border-color: color-mix(in oklab, var(--ink) 40%, transparent); background: var(--glass-2); }
  .phone.bad .num, .phone.bad .cc { border-color: color-mix(in oklab, var(--danger) 70%, transparent); }

  .err {
    display: flex; align-items: center; gap: 0.4rem;
    color: var(--danger); font-size: 0.8rem; margin: 0.55rem 0 0;
    min-height: 1.1rem;
  }
  .err:empty { display: none; }

  /* Channel choice — where the code gets sent */
  .seg {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem;
    background: var(--well); border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 0.3rem;
  }
  .seg button {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.45rem;
    height: 2.55rem; border: none; border-radius: calc(var(--r-md) - 0.28rem);
    background: transparent; color: var(--ink-2); font: inherit; font-size: 0.88rem; font-weight: 550;
    cursor: pointer; transition: background var(--dur) ease, color var(--dur) ease;
  }
  .seg button.on { background: var(--glass-2); color: var(--ink); box-shadow: inset 0 0 0 1px var(--line); }
  .seg button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .seg .ico { display: grid; place-items: center; }

  .divider { height: 1px; background: var(--line); margin: 1.25rem 0; }

  .legal {
    font-size: 0.72rem; line-height: 1.5; color: var(--ink-3);
    text-align: center; margin: 0 0 1.15rem;
  }
  .legal a { color: var(--ink-2); text-decoration: underline; text-underline-offset: 2px; }
  .legal a:hover { color: var(--ink); }

  /* The one CTA — monochrome, because this is Bumpy's own chrome */
  .cta {
    width: 100%; height: 3.15rem; border: none; border-radius: var(--r-pill);
    background: var(--ink); color: #101010; cursor: pointer;
    font-size: var(--cta-size); font-weight: 650; letter-spacing: 0.01em;
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    transition: transform 120ms var(--ease), background var(--dur) ease, opacity var(--dur) ease;
  }
  .cta:hover:not(:disabled) { background: #fff; transform: translateY(-1px); }
  .cta:active:not(:disabled) { transform: translateY(0); }
  .cta:disabled { opacity: 0.32; cursor: not-allowed; }
  .cta:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }
  .spin { width: 1.05rem; height: 1.05rem; border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.25); border-top-color: #101010; animation: sp 0.7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }

  .textbtn {
    width: 100%; background: none; border: none; margin-top: 0.7rem;
    color: var(--ink-2); font: inherit; font-size: 0.86rem; cursor: pointer;
    padding: 0.6rem; border-radius: var(--r-md); transition: color var(--dur) ease;
  }
  .textbtn:hover { color: var(--ink); }
  .textbtn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  .recaptcha {
    margin: 0.95rem 0 0; text-align: center;
    font-size: 0.66rem; color: var(--ink-3);
  }
  .recaptcha a { color: var(--ink-3); text-decoration: underline; text-underline-offset: 2px; }

  /* ---------------- OTP step ---------------- */
  .sent { text-align: center; color: var(--ink-2); font-size: 0.84rem; margin: 0 0 1.15rem; }
  .sent b { color: var(--ink); font-variant-numeric: tabular-nums; }
  .otp { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 0.2rem; }
  .otp input {
    width: 2.85rem; height: 3.35rem; text-align: center;
    background: var(--glass); border: 1px solid var(--line); border-radius: var(--r-md);
    color: var(--ink); font-size: 1.4rem; font-weight: 600; font-variant-numeric: tabular-nums;
    transition: border-color var(--dur) ease, background var(--dur) ease;
  }
  .otp input:focus { outline: none; border-color: var(--ink); background: var(--glass-2); }
  .otp.bad input { border-color: color-mix(in oklab, var(--danger) 55%, transparent); }
  @media (max-width: 360px) { .otp input { width: 2.4rem; height: 3rem; font-size: 1.2rem; } }

  .resend { display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
    margin: 1.25rem 0 1.4rem; }
  .resend-lbl { font-size: var(--label); letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); }
  /* Every channel is a bubble; each shows its own timer while it cools down,
     so the channel your code was sent on reads just like the others. */
  .channels { display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; }
  .alt {
    display: inline-flex; align-items: center; gap: 0.5rem;
    height: 2.5rem; padding: 0 0.95rem; border-radius: var(--r-pill);
    background: var(--glass); border: 1px solid var(--line); color: var(--ink);
    font: inherit; font-size: 0.85rem; cursor: pointer;
    transition: background var(--dur) ease, border-color var(--dur) ease, transform 120ms var(--ease);
  }
  .alt:not(:disabled):hover { background: var(--glass-2); border-color: color-mix(in oklab, var(--ink) 22%, transparent); transform: translateY(-1px); }
  .alt:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .alt:disabled { cursor: not-allowed; opacity: 0.4; }
  /* The channel the current code went to: kept legible even while counting down */
  .alt.current { background: var(--glass-2); border-color: color-mix(in oklab, var(--ink) 32%, transparent); }
  .alt.current:disabled { opacity: 0.72; }
  .alt .ico { display: grid; place-items: center; }
  .alt.wa .ico { color: var(--wa); }
  .alt.sms .ico { color: var(--sms); }
  .alt.email .ico { color: var(--ink-2); }
  .alt-cd { color: var(--ink-3); font-variant-numeric: tabular-nums; }

  .toast {
    position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%) translateY(1rem);
    z-index: 70; background: var(--ink); color: #111; font-size: 0.82rem; font-weight: 600;
    padding: 0.6rem 1rem; border-radius: var(--r-pill); opacity: 0; pointer-events: none;
    transition: opacity var(--dur) ease, transform var(--dur) var(--ease);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise 420ms var(--ease) both; }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  }
&lt;/style&gt;

              &lt;svg width=&quot;17&quot; height=&quot;17&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;currentColor&quot; aria-hidden=&quot;true&quot;&gt;
                &lt;path d=&quot;M12.04 2.5a9.5 9.5 0 0 0-8.1 14.42L2.5 21.5l4.7-1.4A9.5 9.5 0 1 0 12.04 2.5Zm0 1.7a7.8 7.8 0 0 1 6.6 11.95c-.2.32-.14.29-.6 2.02l-1.98-.52-.36.21a7.8 7.8 0 1 1-3.66-13.66Zm-3.2 3.6c-.16 0-.42.06-.64.3-.22.24-.85.83-.85 2.02 0 1.2.87 2.35.99 2.51.12.16 1.7 2.72 4.19 3.71 2.07.82 2.49.66 2.94.62.45-.04 1.45-.59 1.66-1.17.2-.57.2-1.06.14-1.16-.06-.1-.22-.16-.46-.28-.24-.12-1.45-.72-1.67-.8-.22-.08-.39-.12-.55.12-.16.24-.63.8-.77.96-.14.16-.28.18-.52.06-.24-.12-1.03-.38-1.96-1.21-.72-.64-1.21-1.44-1.35-1.68-.14-.24-.02-.37.1-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.34-.76-1.83-.2-.47-.4-.41-.55-.42h-.47Z&quot;/&gt;

&lt;script&gt;
  /* ---- Cross-page navigation (matches the funnel pages) ---------------- */
  const NAV = (() =&gt; {
    const A = {
      event:    &quot;https://claude.ai/code/artifact/77f4ef1f-f3a4-4ee2-b89b-02127d17edc5&quot;,
      login:    &quot;https://claude.ai/code/artifact/b0fd7a83-c8c8-43dd-84d9-41c1dc2a02f8&quot;,
    };
    const R = { event: &quot;bumpy-event-page-mockup.html&quot;, login: &quot;bumpy-login-mockup.html&quot; };
    const onArtifact = /(^|\.)claude\.ai$/.test(location.hostname);
    return (key) =&gt; {
      try { if (window.parent &amp;&amp; window.parent !== window) { window.parent.postMessage({ bumpyNav: key }, &quot;*&quot;); return; } } catch (e) {}
      window.location.href = (onArtifact ? A : R)[key] || (onArtifact ? A.event : R.event);
    };
  })();

  const $ = (id) =&gt; document.getElementById(id);
  const toast = $(&quot;toast&quot;);
  function say(msg) {
    toast.textContent = msg; toast.classList.add(&quot;show&quot;);
    clearTimeout(toast._t); toast._t = setTimeout(() =&gt; toast.classList.remove(&quot;show&quot;), 2200);
  }

  let step = &quot;phone&quot;;               // &quot;phone&quot; | &quot;otp&quot;
  let dial = &quot;+66&quot;;
  let firstChannel = &quot;sms&quot;;         // phone-step choice: where the FIRST code goes (sms | whatsapp)
  let channel = &quot;sms&quot;;              // the channel the current code was sent on (sms | whatsapp | email)

  /* Demo account: a phone that already has an email on file unlocks the Email
     resend option (masked). Set to null to simulate an account with no email. */
  const account = { email: &quot;eldar@gmail.com&quot; };

  /* ---- Country code selector ---- */
  $(&quot;cc&quot;).addEventListener(&quot;change&quot;, (e) =&gt; {
    const [, flag, code] = e.target.value.split(&quot;|&quot;);
    $(&quot;cc-flag&quot;).textContent = flag;
    $(&quot;cc-code&quot;).textContent = code;
    dial = code;
    validatePhone();
  });

  /* ---- Phone-step channel selector: where the FIRST code gets sent ---- */
  const segSms = $(&quot;seg-sms&quot;), segWa = $(&quot;seg-wa&quot;);
  function setFirstChannel(ch) {
    firstChannel = ch;
    const isSms = ch === &quot;sms&quot;;
    segSms.classList.toggle(&quot;on&quot;, isSms);
    segWa.classList.toggle(&quot;on&quot;, !isSms);
    segSms.setAttribute(&quot;aria-checked&quot;, String(isSms));
    segWa.setAttribute(&quot;aria-checked&quot;, String(!isSms));
  }
  segSms.addEventListener(&quot;click&quot;, () =&gt; setFirstChannel(&quot;sms&quot;));
  segWa.addEventListener(&quot;click&quot;, () =&gt; setFirstChannel(&quot;whatsapp&quot;));

  /* ---- Phone step ---- */
  const numEl = $(&quot;num&quot;);
  const digits = (s) =&gt; (s.match(/\d/g) || []).join(&quot;&quot;);
  function validatePhone() {
    // demo rule: a plausible number is 6–14 digits
    const n = digits(numEl.value);
    const ok = n.length &gt;= 6 &amp;&amp; n.length &lt;= 14;
    $(&quot;continue&quot;).disabled = !ok;
    return ok;
  }
  numEl.addEventListener(&quot;input&quot;, () =&gt; {
    $(&quot;phone-wrap&quot;).classList.remove(&quot;bad&quot;);
    $(&quot;phone-err&quot;).textContent = &quot;&quot;;
    validatePhone();
  });

  function maskPhone() {
    const n = digits(numEl.value);
    const last2 = n.slice(-2);
    const bullets = &quot;•&quot;.repeat(Math.max(0, n.length - 2));
    // keep the last two digits together and unbroken

  const errIcon = '&lt;svg width=&quot;14&quot; height=&quot;14&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;9&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.8&quot;/&gt;&lt;path d=&quot;M12 7.5v5&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot;/&gt;&lt;circle cx=&quot;12&quot; cy=&quot;16.3&quot; r=&quot;1&quot; fill=&quot;currentColor&quot;/&gt;&lt;/svg&gt;';

  .wordmark{display:inline-flex;align-items:center;gap:.34em;font-family:'Baloo 2',system-ui,sans-serif;font-weight:700;font-size:1.25rem;letter-spacing:-.02em;line-height:1;color:var(--ink)}
  .wordmark .dot{width:.37em;height:.37em;border-radius:50%;background:#e7ff1a;flex:none;transform-origin:center;animation:bumppulse 2.4s ease-in-out infinite}
  @keyframes bumppulse{0%,100%{transform:scale(1)}45%{transform:scale(.55)}}
  @media (prefers-reduced-motion:reduce){.wordmark .dot{animation:none}}
  .navlink{font-size:.92rem;font-weight:600;color:var(--ink);text-decoration:none;transition:opacity .18s}
  .navlink:hover{opacity:.7}
  @media (min-width:1024px){ .hdr-in{padding-top:1.2rem;padding-bottom:1.2rem} .wordmark{font-size:1.6rem} .navlink{font-size:1.05rem} }

  .back:hover{color:var(--ink)}

  .page{max-width:1180px;margin:0 auto;padding:0 clamp(1rem,4vw,2rem) 5rem}

  /* cover */
  /* full-bleed cover — spans the whole viewport width, content stays in the 1180 container */
  .cover{position:relative;width:100vw;margin-left:calc(50% - 50vw);height:clamp(200px,30vw,360px);border-radius:0;overflow:hidden;margin-bottom:0}
  .cover .img{position:absolute;inset:0;background:
    radial-gradient(80% 120% at 20% 0%, #ff8a4a 0%, transparent 55%),
    radial-gradient(90% 130% at 90% 20%, #7c3bd6 0%, transparent 55%),
    linear-gradient(160deg,#3a1c12,#0c0a14);}
  .cover .grain{position:absolute;inset:0;opacity:.5;mix-blend-mode:overlay;background:radial-gradient(circle at 30% 40%,rgba(255,255,255,.12),transparent 40%),radial-gradient(circle at 75% 60%,rgba(255,255,255,.08),transparent 35%)}
  .cover .scrim{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 2%,transparent 55%)}

  /* profile row */
  .profile{display:flex;align-items:flex-end;gap:1.2rem;margin-top:-3.4rem;position:relative;z-index:2;padding:0 .3rem}
  .avatar{width:6.4rem;height:6.4rem;border-radius:50%;flex-shrink:0;display:grid;place-items:center;
    background:linear-gradient(150deg,#ff9a5a,#ff5a2c);color:#1a2300;font-weight:800;font-size:2.4rem;
    box-shadow:0 14px 40px -10px rgba(255,122,69,.55);border:3px solid var(--bg)}
  .who{padding-bottom:.35rem;min-width:0}
  .who h1{font-size:clamp(1.6rem,4.4vw,2.3rem);font-weight:800;letter-spacing:-.03em;margin:0;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .verified{color:var(--pos)}
  .who .meta{color:var(--ink-2);font-size:.9rem;margin-top:.15rem;display:flex;flex-wrap:wrap;gap:.15rem .65rem}
  .who .meta span{display:inline-flex;align-items:center;gap:.65rem;white-space:nowrap}
  .who .meta span:not(:first-child)::before{content:&quot;&quot;;width:3px;height:3px;border-radius:50%;background:var(--ink-3);flex-shrink:0}

  .actions{display:flex;gap:.6rem;margin:1.4rem .3rem 0}
  .btn{border:none;border-radius:var(--r-pill);padding:.7rem 1.4rem;font-size:.9rem;font-weight:700;cursor:pointer}
  .btn.primary{background:linear-gradient(135deg,var(--glow),var(--accent));color:var(--accent-ink);box-shadow:0 10px 26px -8px color-mix(in oklab,var(--accent) 55%,transparent)}
  .btn.ghost{background:var(--glass);color:var(--ink);border:1px solid var(--line)}
  .btn.icon{padding:.7rem;width:2.7rem;display:grid;place-items:center}

  .bio{margin:1.6rem .3rem 0;color:var(--ink-2);font-size:.98rem;max-width:66ch}
  .bio b{color:var(--ink);font-weight:600}
  /* communication channels — producer picks any */
  .channels{display:flex;gap:.55rem;margin:1.1rem .3rem 0;flex-wrap:wrap}
  .ch{width:2.5rem;height:2.5rem;border-radius:50%;display:grid;place-items:center;background:var(--glass);border:1px solid var(--line);color:var(--ink-2);transition:color .18s,background .18s,transform .18s;cursor:pointer;text-decoration:none}
  .ch:hover{color:var(--ink);background:var(--glass-2);transform:translateY(-2px)}
  .ch:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  /* tabs */
  .tabs{display:flex;gap:.3rem;margin:2.6rem .3rem 1.4rem;border-bottom:1px solid var(--line)}
  .tab{background:none;border:none;color:var(--ink-3);font:inherit;font-size:.92rem;font-weight:600;padding:.6rem .8rem;cursor:pointer;position:relative}
  .tab.on{color:var(--ink)}
  .tab.on::after{content:&quot;&quot;;position:absolute;left:.8rem;right:.8rem;bottom:-1px;height:2px;background:var(--accent);border-radius:2px}
  .tab .c{color:var(--ink-3);font-weight:700;font-size:.78rem;margin-left:.3rem}

  /* events grid — poster forward */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:clamp(1rem,2.5vw,1.5rem)}
  .card{background:var(--well);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:transform var(--dur) var(--ease),border-color var(--dur) ease}
  .card:hover{transform:translateY(-3px);border-color:color-mix(in oklab,var(--ink) 16%,transparent)}
  .card:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .card .art{position:relative;aspect-ratio:1;overflow:hidden}
  .card .art svg{display:block;width:100%;height:100%}
  .card .date-chip{position:absolute;top:.7rem;left:.7rem;background:rgba(10,10,12,.7);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:.6rem;padding:.3rem .5rem;text-align:center;line-height:1}
  .card .date-chip .d{font-size:1.05rem;font-weight:800}
  .card .date-chip .m{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);margin-top:.15rem}
  .card .status{position:absolute;top:.7rem;right:.7rem;font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.24rem .5rem;border-radius:var(--r-pill);background:rgba(10,10,12,.7);backdrop-filter:blur(8px)}
  .card .status.sold{color:var(--accent)}
  .card .body{padding:.9rem 1rem 1.1rem}
  .card .body h3{font-size:1rem;font-weight:700;letter-spacing:-.01em;margin:0 0 .2rem}
  .card .body .v{color:var(--ink-2);font-size:.82rem}
  .card .body .loc{color:var(--ink-3);font-size:.76rem;margin-top:.2rem;display:flex;align-items:center;gap:.32rem}
  .card .body .loc svg{flex-shrink:0}
  .card .body .p{margin-top:.6rem;font-size:.86rem;font-weight:700}
  .card .body .p small{color:var(--ink-3);font-weight:500}
  .card.past .art{filter:saturate(.7) brightness(.7)}
  .card.past{opacity:.86}

  .sectionlbl{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin:2.4rem .3rem 1.1rem}
  .note{margin-top:3rem;padding:1.1rem 1.2rem;background:var(--well);border:1px solid var(--line);border-radius:var(--r-lg);color:var(--ink-3);font-size:.82rem}
  .note b{color:var(--ink-2)}

  &lt;div class=&quot;note&quot;&gt;&lt;b&gt;New page — data it needs.&lt;/b&gt; Today the event carries only &lt;code&gt;organization: { name, logo }&lt;/code&gt;. A producer page adds: &lt;b&gt;slug&lt;/b&gt; (the URL), &lt;b&gt;cover image&lt;/b&gt;, &lt;b&gt;bio&lt;/b&gt;, a &lt;b&gt;verified&lt;/b&gt; flag, a producer-chosen set of &lt;b&gt;channels&lt;/b&gt; (Instagram / WhatsApp / Phone / Facebook / TikTok / Email / website — any subset), and an &lt;b&gt;events-by-organizer&lt;/b&gt; query (upcoming + past, each with title, poster, date, venue, &lt;b&gt;city + country&lt;/b&gt;, from-price, ticket-type count, status). &lt;b&gt;The descriptor line (&quot;Nightlife · Beach&quot;) is auto-derived&lt;/b&gt; from the top 1–2 of the producer's existing &lt;code&gt;event.categories&lt;/code&gt; — no genre to write, no AI to guess; a Shabbat-dinner house reads &quot;Community · Food&quot;. &lt;b&gt;No location on the producer&lt;/b&gt; — they run events in many places. “48 events” is a real count; sample events are placeholder.&lt;/div&gt;

&lt;script&gt;
  // from:true → event has more than one ticket type (show &quot;From {price}&quot;)

    {t:&quot;Deep End&quot;, v:&quot;Zen Beach&quot;, loc:&quot;Koh Phangan, Thailand&quot;, cat:&quot;Nightlife&quot;, d:&quot;22&quot;, m:&quot;Jul&quot;, p:&quot;600&quot;, sky:[&quot;#0e1f3a&quot;,&quot;#2a63b8&quot;,&quot;#7fd6ec&quot;,&quot;#0a1526&quot;]},
    {t:&quot;Jungle Experiment&quot;, v:&quot;Jungle Club&quot;, loc:&quot;Bali, Indonesia&quot;, cat:&quot;Beach&quot;, d:&quot;29&quot;, m:&quot;Jul&quot;, p:&quot;400&quot;, from:true, sold:true, sky:[&quot;#05140d&quot;,&quot;#103d2a&quot;,&quot;#c6f543&quot;,&quot;#061a12&quot;]},
    {t:&quot;Full Moon Warmup&quot;, v:&quot;Haad Rin Beach&quot;, loc:&quot;Koh Phangan, Thailand&quot;, cat:&quot;Nightlife&quot;, d:&quot;03&quot;, m:&quot;Aug&quot;, p:&quot;550&quot;, sky:[&quot;#2a0f38&quot;,&quot;#8b2fb0&quot;,&quot;#ff8cf0&quot;,&quot;#140a20&quot;]},
    {t:&quot;Sundowner&quot;, v:&quot;Papaya Playa&quot;, loc:&quot;Tulum, Mexico&quot;, cat:&quot;Beach&quot;, d:&quot;10&quot;, m:&quot;Aug&quot;, p:&quot;500&quot;, from:true, sky:[&quot;#3a1508&quot;,&quot;#ff7a2f&quot;,&quot;#ffd27f&quot;,&quot;#1c0f08&quot;]},
    {t:&quot;Night Tide&quot;, v:&quot;Praia Grande&quot;, loc:&quot;Lisbon, Portugal&quot;, cat:&quot;Nightlife&quot;, d:&quot;17&quot;, m:&quot;Aug&quot;, p:&quot;650&quot;, sky:[&quot;#0a1424&quot;,&quot;#245e8f&quot;,&quot;#5fd6d0&quot;,&quot;#08131e&quot;]},
  ];
  const PAST = [
    {t:&quot;Solstice&quot;, v:&quot;Zen Beach&quot;, loc:&quot;Koh Phangan, Thailand&quot;, cat:&quot;Nightlife&quot;, d:&quot;21&quot;, m:&quot;Jun&quot;, p:&quot;500&quot;, sky:[&quot;#2b1535&quot;,&quot;#ff6b4a&quot;,&quot;#ffc46b&quot;,&quot;#1a1030&quot;]},
    {t:&quot;Low Tide&quot;, v:&quot;Secret Beach&quot;, loc:&quot;Koh Phangan, Thailand&quot;, cat:&quot;Beach&quot;, d:&quot;07&quot;, m:&quot;Jun&quot;, p:&quot;450&quot;, from:true, sky:[&quot;#0e1f3a&quot;,&quot;#2a63b8&quot;,&quot;#7fd6ec&quot;,&quot;#0a1526&quot;]},
    {t:&quot;Afterglow&quot;, v:&quot;Papaya Playa&quot;, loc:&quot;Tulum, Mexico&quot;, cat:&quot;Live Music&quot;, d:&quot;24&quot;, m:&quot;May&quot;, p:&quot;500&quot;, from:true, sky:[&quot;#3a1508&quot;,&quot;#ff7a2f&quot;,&quot;#ffd27f&quot;,&quot;#1c0f08&quot;]},
    {t:&quot;Mango Sessions&quot;, v:&quot;Jungle Club&quot;, loc:&quot;Bali, Indonesia&quot;, cat:&quot;Nightlife&quot;, d:&quot;10&quot;, m:&quot;May&quot;, p:&quot;400&quot;, sky:[&quot;#05140d&quot;,&quot;#103d2a&quot;,&quot;#c6f543&quot;,&quot;#061a12&quot;]},
  ];

  // Producer descriptor = the top 1–2 categories across all their events. No genre
  // to write, no AI to guess — it stays correct as they post events, and matches
  // however the producer's events are actually categorised (community, food, …).
  (() =&gt; {
    const freq = {};
    [...UP, ...PAST].forEach(e =&gt; { if (e.cat) freq[e.cat] = (freq[e.cat] || 0) + 1; });
    const top = Object.entries(freq).sort((a,b) =&gt; b[1]-a[1]).slice(0,2).map(x =&gt; x[0]);
    const meta = document.getElementById('meta');
    top.forEach(c =&gt; { const s = document.createElement('span'); s.textContent = c; meta.appendChild(s); });
  })();
  const PIN = '&lt;svg width=&quot;12&quot; height=&quot;12&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot;&gt;&lt;path d=&quot;M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11Z&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.9&quot;/&gt;&lt;circle cx=&quot;12&quot; cy=&quot;10&quot; r=&quot;2.3&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.9&quot;/&gt;&lt;/svg&gt;';
  const card = (e,past)=&gt;`
    &lt;div class=&quot;card ${past?'past':''}&quot; role=&quot;button&quot; tabindex=&quot;0&quot; aria-label=&quot;Open ${e.t}&quot;&gt;
      &lt;div class=&quot;art&quot; style=&quot;--sky-a:${e.sky[0]};--sky-b:${e.sky[1]};--c:${e.sky[2]};--sea:${e.sky[3]}&quot;&gt;
        &lt;svg viewBox=&quot;0 0 100 100&quot;&gt;&lt;defs&gt;&lt;linearGradient id=&quot;sky&quot; x1=&quot;0&quot; y1=&quot;0&quot; x2=&quot;0&quot; y2=&quot;1&quot;&gt;&lt;stop offset=&quot;0&quot; stop-color=&quot;${e.sky[0]}&quot;/&gt;&lt;stop offset=&quot;.62&quot; stop-color=&quot;${e.sky[1]}&quot;/&gt;&lt;stop offset=&quot;1&quot; stop-color=&quot;${e.sky[2]}&quot;/&gt;&lt;/linearGradient&gt;&lt;/defs&gt;&lt;rect width=&quot;100&quot; height=&quot;66&quot; fill=&quot;url(#sky)&quot;/&gt;&lt;circle cx=&quot;50&quot; cy=&quot;62&quot; r=&quot;14&quot; fill=&quot;${e.sky[2]}&quot;/&gt;&lt;rect y=&quot;66&quot; width=&quot;100&quot; height=&quot;34&quot; fill=&quot;${e.sky[3]}&quot;/&gt;&lt;rect x=&quot;33&quot; y=&quot;74&quot; width=&quot;34&quot; height=&quot;2.4&quot; rx=&quot;1.2&quot; fill=&quot;${e.sky[2]}&quot; opacity=&quot;.5&quot;/&gt;&lt;/svg&gt;
        &lt;div class=&quot;date-chip&quot;&gt;&lt;div class=&quot;d&quot;&gt;${e.d}&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;${e.m}&lt;/div&gt;&lt;/div&gt;
        ${e.sold?'&lt;div class=&quot;status sold&quot;&gt;Sold out&lt;/div&gt;':''}
      &lt;/div&gt;
      &lt;div class=&quot;body&quot;&gt;
        &lt;h3&gt;${e.t}&lt;/h3&gt;
        &lt;div class=&quot;v&quot;&gt;${e.v}&lt;/div&gt;
        &lt;div class=&quot;loc&quot;&gt;${PIN}${e.loc}&lt;/div&gt;
        &lt;div class=&quot;p&quot;&gt;${e.from?'&lt;small&gt;From&lt;/small&gt; ':''}${e.p} &lt;small&gt;THB&lt;/small&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;`;

  // tabs — Upcoming / Past both clickable, swap the single grid
  const grid = document.getElementById('grid');
  const tabs = [...document.querySelectorAll('.tab')];
  function render(which){
    const list = which === 'past' ? PAST : UP;
    grid.innerHTML = list.map(e =&gt; card(e, which === 'past')).join('');
    tabs.forEach(t =&gt; t.classList.toggle('on', t.dataset.tab === which));
  }
  tabs.forEach(t =&gt; t.addEventListener('click', () =&gt; render(t.dataset.tab)));

  // whole card is the click target → the event page (same full-cell affordance as WHERE)
  function goEvent(){
    try{ if(window.parent &amp;&amp; window.parent!==window){ window.parent.postMessage({bumpyNav:'event'},'*'); return; } }catch(e){}
    window.location.href = 'bumpy-event-page-mockup.html';
  }
  grid.addEventListener('click', e =&gt; { if (e.target.closest('.card')) goEvent(); });
  grid.addEventListener('keydown', e =&gt; { const c = e.target.closest('.card'); if (c &amp;&amp; (e.key==='Enter' || e.key===' ')){ e.preventDefault(); goEvent(); } });

  render('up');
&lt;/script&gt;
"></iframe>

<button class="reset" id="reset" title="Back to the event page">↻ Restart flow</button>
<button class="reset chip2" id="gatebtn" title="Preview a private (password-gated) event">🔒 Private event</button>

<script>
  const KEYS = ["event","select","checkout","confirm","login","gate","producer"];
  // the tickets chosen on "Choose Ticket", carried forward to Pay + Confirmation
  let lastOrder = null;
  let loggedIn = false;        // demo auth state that drives the checkout gate
  let pendingRedirect = null;  // where to resume after a gated login
  function show(key, push = true) {
    if (!KEYS.includes(key)) return;
    document.querySelectorAll(".pg").forEach(f => f.classList.toggle("on", f.dataset.key === key));
    // scroll the newly shown page back to top
    const f = document.getElementById("pg-" + key);
    try { f.contentWindow.scrollTo(0,0); } catch(e) {}
    // hand the current order to the page being shown, so its summary matches
    if (lastOrder) { try { f.contentWindow.postMessage({ bumpyOrder: lastOrder }, "*"); } catch(e) {} }
    window.scrollTo(0,0);
    // Real browser history so the BACK button works like production (each page is
    // a route there). push=false when restoring from popstate or the first load.
    if (push) history.pushState({ bumpyKey: key }, "", "#" + key);
  }
  // Back/forward button → restore the page from history without re-pushing
  window.addEventListener("popstate", (e) => {
    const key = (e.state && e.state.bumpyKey) || "event";
    if (key !== "login") pendingRedirect = null;
    show(key, false);
  });
  // the embedded pages post their intended destination (and, from Choose Ticket,
  // the order they built); login posts when the OTP check passes
  window.addEventListener("message", (e) => {
    const d = e.data;
    if (!d) return;
    if (d.bumpyLoginDone) {                     // authenticated — resume the redirect
      loggedIn = true;
      const dest = pendingRedirect || "event";
      pendingRedirect = null;
      show(dest);
      return;
    }
    if (typeof d.bumpyNav !== "string") return;
    if (d.order) lastOrder = d.order;
    // Auth gate: picking tickets sends you to login first; Pay resumes after
    if (d.bumpyNav === "checkout" && !loggedIn) {
      pendingRedirect = "checkout";
      show("login");
      return;
    }
    if (d.bumpyNav !== "login") pendingRedirect = null;   // navigating elsewhere drops a pending login
    show(d.bumpyNav);
  });
  document.getElementById("reset").addEventListener("click", () => {
    lastOrder = null; loggedIn = false; pendingRedirect = null; show("event");
  });
  // demo: preview the private-event password gate (unlocks back to the event)
  document.getElementById("gatebtn").addEventListener("click", () => show("gate"));
  history.replaceState({ bumpyKey: "event" }, "", "#event");
  show("event", false);
</script>
